&lt;main&gt;

&lt;!-- ════════════════════════════════════════ --&gt;
&lt;!-- SECTION 1: RESUME --&gt;
&lt;!-- ════════════════════════════════════════ --&gt;
&lt;section id=&quot;resume&quot;&gt;
  &lt;div class=&quot;section-label&quot;&gt;Bagian 1&lt;/div&gt;
  &lt;h2&gt;📋 Ringkasan Materi (Resume)&lt;/h2&gt;

  &lt;div class=&quot;def-box&quot;&gt;
    &lt;p&gt;&lt;strong&gt;Upwelling&lt;/strong&gt; adalah istilah yang digunakan untuk menggambarkan proses-proses yang menyebabkan air laut bergerak ke atas dari suatu kedalaman menuju lapisan permukaan.&lt;/p&gt;
    &lt;p class=&quot;source&quot;&gt;Sumber: Bowden (1983); Stewart (1983)&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card accent-cyan&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;Fakta Kunci&lt;/div&gt;
    &lt;p&gt;Kedalaman lapisan upwelling biasanya berkisar &lt;strong&gt;200–300 m&lt;/strong&gt;. Air yang naik ini berasal dari bawah lapisan campuran (&lt;em&gt;mixed layer&lt;/em&gt;) yang membawa nutrien dari lapisan dalam ke permukaan.&lt;/p&gt;
  &lt;/div&gt;

  &lt;h3&gt;1.1 Konteks dalam Oseanografi&lt;/h3&gt;
  &lt;p&gt;Upwelling merupakan salah satu fenomena penting dalam mata kuliah Oseanografi, bersama dengan: &lt;strong&gt;Arus, Gelombang, Pasang, Front,&lt;/strong&gt; dan &lt;strong&gt;Tsunami&lt;/strong&gt;.&lt;/p&gt;

  &lt;h3&gt;1.2 Mekanisme Fisik Utama&lt;/h3&gt;
  &lt;p&gt;Upwelling terjadi akibat pergerakan horizontal massa air yang didorong oleh angin (Ekman Transport). Ketika massa air permukaan bergerak menjauh dari pantai, air dari lapisan bawah naik untuk mengisi kekosongan tersebut. Di belahan bumi utara, angin utara sepanjang pantai timur menyebabkan Transpor Ekman (ME) menjauhi pantai, sehingga air bawah naik ke permukaan.&lt;/p&gt;

  &lt;h3&gt;1.3 Distribusi Vertikal Suhu &amp; Lapisan Laut&lt;/h3&gt;
  &lt;div class=&quot;layer-diagram mb16&quot;&gt;
    &lt;div class=&quot;layer layer-mix&quot;&gt;
      &lt;div&gt;
        &lt;div class=&quot;layer-name&quot;&gt;Mix Layer (Lapisan Campuran)&lt;/div&gt;
        &lt;div class=&quot;layer-desc&quot;&gt;Suhu relatif homogen, dipengaruhi angin dan radiasi matahari&lt;/div&gt;
        &lt;div class=&quot;layer-depth&quot;&gt;Lapisan paling atas&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;layer layer-thermo&quot;&gt;
      &lt;div&gt;
        &lt;div class=&quot;layer-name&quot;&gt;Thermocline&lt;/div&gt;
        &lt;div class=&quot;layer-desc&quot;&gt;Penurunan suhu tajam terhadap kedalaman&lt;/div&gt;
        &lt;div class=&quot;layer-depth&quot;&gt;Zona transisi suhu&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;layer layer-deep&quot;&gt;
      &lt;div&gt;
        &lt;div class=&quot;layer-name&quot;&gt;Deep Layer (Lapisan Dalam)&lt;/div&gt;
        &lt;div class=&quot;layer-desc&quot;&gt;Suhu dingin dan stabil, kaya nutrien&lt;/div&gt;
        &lt;div class=&quot;layer-depth&quot;&gt;200–300 m ke bawah&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;h3&gt;1.4 Proses Terjadinya Upwelling&lt;/h3&gt;
  &lt;div class=&quot;steps&quot;&gt;
    &lt;div class=&quot;step&quot;&gt;
      &lt;div class=&quot;step-num&quot;&gt;1&lt;/div&gt;
      &lt;div class=&quot;step-content&quot;&gt;
        &lt;strong&gt;Ekman Pump&lt;/strong&gt;
        &lt;p&gt;Angin menyebabkan transport massa air secara horizontal (Transpor Ekman). Di pantai, air permukaan bergerak menjauhi pantai sehingga air dalam naik.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;step&quot;&gt;
      &lt;div class=&quot;step-num&quot;&gt;2&lt;/div&gt;
      &lt;div class=&quot;step-content&quot;&gt;
        &lt;strong&gt;Defleksi&lt;/strong&gt;
        &lt;p&gt;Perubahan arah arus akibat gaya Coriolis menyebabkan pergerakan vertikal massa air.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;step&quot;&gt;
      &lt;div class=&quot;step-num&quot;&gt;3&lt;/div&gt;
      &lt;div class=&quot;step-content&quot;&gt;
        &lt;strong&gt;Pusaran Siklun (Cyclonic Eddy)&lt;/strong&gt;
        &lt;p&gt;Pola arus melingkar siklonik menciptakan divergensi di tengah pusaran, memicu air bawah naik ke permukaan.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;h3&gt;1.5 Upwelling di Laut Lepas (Divergensi)&lt;/h3&gt;
  &lt;div class=&quot;highlight&quot;&gt;
    &lt;p&gt;Di laut lepas, upwelling terjadi karena pola arus permukaan yang menyebar (&lt;em&gt;divergence&lt;/em&gt;), sehingga massa air dari lapisan bawah permukaan mengalir ke atas mengisi kekosongan yang terjadi karena menyebarnya arus.&lt;/p&gt;
  &lt;/div&gt;

  &lt;h3&gt;1.6 Jenis-Jenis Upwelling&lt;/h3&gt;
  &lt;div class=&quot;table-wrap&quot;&gt;
    &lt;table&gt;
      &lt;thead&gt;
        &lt;tr&gt;&lt;th&gt;Jenis&lt;/th&gt;&lt;th&gt;Nama Inggris&lt;/th&gt;&lt;th&gt;Karakteristik&lt;/th&gt;&lt;th&gt;Contoh Lokasi&lt;/th&gt;&lt;/tr&gt;
      &lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Tetap&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;&lt;em&gt;Stationary type&lt;/em&gt;&lt;/td&gt;&lt;td&gt;Terjadi sepanjang tahun, intensitas dapat berubah&lt;/td&gt;&lt;td&gt;Lepas pantai Peru&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Berkala&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;&lt;em&gt;Periodic type&lt;/em&gt;&lt;/td&gt;&lt;td&gt;Terjadi hanya satu musim; air berat dari bawah menggantikan air permukaan&lt;/td&gt;&lt;td&gt;Selatan Jawa&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Silih berganti&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;&lt;em&gt;Alternating type&lt;/em&gt;&lt;/td&gt;&lt;td&gt;Bergantian dengan penenggelaman (&lt;em&gt;sinking&lt;/em&gt;); satu musim air naik, musim berikut tenggelam&lt;/td&gt;&lt;td&gt;Laut Banda, Arafura&lt;/td&gt;&lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;
  &lt;/div&gt;

  &lt;h3&gt;1.7 Dampak Upwelling&lt;/h3&gt;
  &lt;div class=&quot;card-grid&quot;&gt;
    &lt;div class=&quot;card accent-green&quot;&gt;
      &lt;div class=&quot;card-title&quot;&gt;Dampak Biologi&lt;/div&gt;
      &lt;p&gt;Meningkatkan produktivitas biologis perairan karena membawa nutrien (nitrit, fosfat, silikat) dari lapisan dalam ke zona fotik, mendukung pertumbuhan fitoplankton dan perikanan.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card accent-amber&quot;&gt;
      &lt;div class=&quot;card-title&quot;&gt;Dampak Cuaca&lt;/div&gt;
      &lt;p&gt;Air dingin dari upwelling mengubah iklim lokal: menyebabkan kabut, awan stratus rendah, atmosfer stabil, sedikit konveksi, dan curah hujan sedikit.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card accent-blue&quot;&gt;
      &lt;div class=&quot;card-title&quot;&gt;Dampak Sirkulasi&lt;/div&gt;
      &lt;p&gt;Variabilitas spasial transport di samudra terbuka menghasilkan upwelling dan downwelling, yang menyebabkan redistribusi massa air dan menggerakkan arus geostropi melalui pemompaan Ekman.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/section&gt;

&lt;!-- ════════════════════════════════════════ --&gt;
&lt;!-- SECTION 2: CATATAN LENGKAP --&gt;
&lt;!-- ════════════════════════════════════════ --&gt;
&lt;section id=&quot;catatan&quot;&gt;
  &lt;div class=&quot;section-label&quot;&gt;Bagian 2&lt;/div&gt;
  &lt;h2&gt;📚 Catatan Belajar Lengkap&lt;/h2&gt;

  &lt;h3&gt;2.1 Definisi dan Batas Kedalaman&lt;/h3&gt;
  &lt;p&gt;Upwelling adalah proses oseanografi yang membawa massa air laut dari kedalaman tertentu ke lapisan permukaan. Menurut Bowden (1983) dan Stewart (1983), &lt;strong&gt;kedalaman lapisan upwelling umumnya berkisar 200–300 m&lt;/strong&gt;. Ini berarti air yang naik berasal dari bawah lapisan thermocline, membawa serta karakteristik fisik dan kimiawi air dalam.&lt;/p&gt;

  &lt;h3&gt;2.2 Distribusi Vertikal Suhu — Detail&lt;/h3&gt;
  &lt;p&gt;Kolom air laut secara vertikal terbagi menjadi tiga lapisan utama berdasarkan profil suhu:&lt;/p&gt;
  &lt;div class=&quot;table-wrap&quot;&gt;
    &lt;table&gt;
      &lt;thead&gt;
        &lt;tr&gt;&lt;th&gt;Lapisan&lt;/th&gt;&lt;th&gt;Nama Inggris&lt;/th&gt;&lt;th&gt;Sifat Suhu&lt;/th&gt;&lt;th&gt;Karakteristik&lt;/th&gt;&lt;/tr&gt;
      &lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;
          &lt;td&gt;&lt;strong&gt;Lapisan Campuran&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Mix Layer&lt;/td&gt;
          &lt;td&gt;Relatif konstan/hangat&lt;/td&gt;
          &lt;td&gt;Dipengaruhi angin &amp; matahari, suhu hampir seragam&lt;/td&gt;
        &lt;/tr&gt;
        &lt;tr&gt;
          &lt;td&gt;&lt;strong&gt;Termoklin&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Thermocline&lt;/td&gt;
          &lt;td&gt;Menurun cepat dengan kedalaman&lt;/td&gt;
          &lt;td&gt;Zona transisi kritis, memisahkan lapisan hangat dan dingin&lt;/td&gt;
        &lt;/tr&gt;
        &lt;tr&gt;
          &lt;td&gt;&lt;strong&gt;Lapisan Dalam&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Deep Layer&lt;/td&gt;
          &lt;td&gt;Dingin dan stabil&lt;/td&gt;
          &lt;td&gt;Kaya nutrien, minim cahaya, sumber air upwelling&lt;/td&gt;
        &lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;
  &lt;/div&gt;
  &lt;div class=&quot;highlight&quot;&gt;
    &lt;p&gt;&lt;strong&gt;Catatan penting:&lt;/strong&gt; Upwelling mengaduk seluruh lapisan sehingga menjadi homogen/tercampur, menghilangkan stratifikasi suhu sementara.&lt;/p&gt;
  &lt;/div&gt;

  &lt;h3&gt;2.3 Proses Fisik Ekman Transport&lt;/h3&gt;
  &lt;p&gt;Mekanisme utama upwelling di kawasan pesisir didasarkan pada &lt;strong&gt;Transpor Ekman (ME)&lt;/strong&gt;:&lt;/p&gt;
  &lt;div class=&quot;card accent-cyan&quot;&gt;
    &lt;p&gt;Di belahan bumi utara: angin utara sepanjang pantai timur menyebabkan Transpor Ekman bergerak &lt;strong&gt;menjauhi pantai&lt;/strong&gt; (tegak lurus ke arah angin, dibelokkan ke kanan oleh gaya Coriolis). Massa air yang bergerak menjauh pantai harus digantikan oleh &lt;strong&gt;air upwelling dari lapisan bawah&lt;/strong&gt; (100–300 m).&lt;/p&gt;
  &lt;/div&gt;
  &lt;p&gt;Sebaliknya, pergerakan horizontal massa air di kawasan pesisir dapat menciptakan gradien tekanan antara perairan pinggir pantai dan laut lepas. Gradien ini mendorong:&lt;/p&gt;
  &lt;ul class=&quot;list&quot;&gt;
    &lt;li&gt;Pergerakan air dari lapisan bawah ke permukaan → &lt;strong&gt;Upwelling&lt;/strong&gt;&lt;/li&gt;
    &lt;li&gt;Pergerakan air dari permukaan ke lapisan bawah → &lt;strong&gt;Downwelling&lt;/strong&gt;&lt;/li&gt;
  &lt;/ul&gt;

  &lt;h3&gt;2.4 Tiga Mekanisme Proses Upwelling&lt;/h3&gt;
  &lt;div class=&quot;card-grid&quot;&gt;
    &lt;div class=&quot;card accent-cyan&quot;&gt;
      &lt;div class=&quot;card-title&quot;&gt;Mekanisme 1&lt;/div&gt;
      &lt;h3&gt;Ekman Pump&lt;/h3&gt;
      &lt;p&gt;Angin mendorong massa air secara horizontal. Ketika transport Ekman mengarah ke lepas pantai, air dari bawah thermocline naik mengisi kekosongan di dekat pantai. Inilah mekanisme dominan di pantai barat benua.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card accent-amber&quot;&gt;
      &lt;div class=&quot;card-title&quot;&gt;Mekanisme 2&lt;/div&gt;
      &lt;h3&gt;Defleksi&lt;/h3&gt;
      &lt;p&gt;Gaya Coriolis membelokkan aliran massa air (ke kanan di belahan bumi utara, ke kiri di selatan), menyebabkan komponen vertikal pada pergerakan air yang kemudian mengangkat air dalam ke permukaan.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card accent-blue&quot;&gt;
      &lt;div class=&quot;card-title&quot;&gt;Mekanisme 3&lt;/div&gt;
      &lt;h3&gt;Pusaran Siklun&lt;/h3&gt;
      &lt;p&gt;Eddy siklonik (berputar berlawanan jarum jam di belahan bumi utara) menciptakan zona divergensi di pusatnya, menyebabkan air dalam naik ke permukaan secara terlokalisasi.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;h3&gt;2.5 Divergensi di Laut Lepas&lt;/h3&gt;
  &lt;div class=&quot;card accent-cyan&quot;&gt;
    &lt;p&gt;Di laut lepas (&lt;em&gt;open ocean&lt;/em&gt;), upwelling dapat terjadi karena pola arus permukaan yang &lt;strong&gt;divergen&lt;/strong&gt; — arus menyebar ke berbagai arah dari satu titik. Akibatnya, massa air dari lapisan bawah permukaan mengalir ke atas untuk mengisi kekosongan yang terbentuk.&lt;/p&gt;
  &lt;/div&gt;

  &lt;h3&gt;2.6 Tiga Jenis Upwelling — Penjelasan Mendalam&lt;/h3&gt;

  &lt;h4&gt;A. Stationary Type (Jenis Tetap)&lt;/h4&gt;
  &lt;p&gt;Terjadi &lt;strong&gt;sepanjang tahun&lt;/strong&gt; meskipun intensitasnya dapat berubah-ubah. Merupakan tipe upwelling yang paling konsisten. Contoh klasik adalah upwelling di &lt;strong&gt;lepas pantai Peru&lt;/strong&gt;, yang dipicu oleh angin pasat yang terus-menerus mendorong Transpor Ekman ke barat, menjauhi pantai Amerika Selatan.&lt;/p&gt;

  &lt;h4&gt;B. Periodic Type (Jenis Berkala)&lt;/h4&gt;
  &lt;p&gt;Terjadi &lt;strong&gt;hanya selama satu musim&lt;/strong&gt;. Selama proses air naik berlangsung, massa air lapisan permukaan meninggalkan lokasi upwelling, dan massa air yang lebih berat dari lapisan bawah bergerak ke atas mencapai permukaan. Contoh: &lt;strong&gt;Perairan Selatan Jawa&lt;/strong&gt; pada musim tenggara (Juni–Agustus).&lt;/p&gt;

  &lt;h4&gt;C. Alternating Type (Jenis Silih Berganti)&lt;/h4&gt;
  &lt;p&gt;Terjadi &lt;strong&gt;bergantian&lt;/strong&gt; dengan penenggelaman massa air (&lt;em&gt;sinking&lt;/em&gt;). Dalam satu musim, air ringan di lapisan permukaan bergerak keluar dari lokasi upwelling; air lebih berat dari lapisan bawah naik ke atas, kemudian tenggelam. Musim berikutnya terjadi kebalikannya. Contoh: &lt;strong&gt;Laut Banda dan Laut Arafura&lt;/strong&gt;.&lt;/p&gt;

  &lt;div class=&quot;table-wrap&quot;&gt;
    &lt;table&gt;
      &lt;thead&gt;
        &lt;tr&gt;&lt;th&gt;Aspek&lt;/th&gt;&lt;th&gt;Stationary&lt;/th&gt;&lt;th&gt;Periodic&lt;/th&gt;&lt;th&gt;Alternating&lt;/th&gt;&lt;/tr&gt;
      &lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;&lt;td&gt;Frekuensi&lt;/td&gt;&lt;td&gt;Sepanjang tahun&lt;/td&gt;&lt;td&gt;Satu musim&lt;/td&gt;&lt;td&gt;Bergantian antar musim&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;Proses lawan&lt;/td&gt;&lt;td&gt;Tidak ada / minimal&lt;/td&gt;&lt;td&gt;Tidak ada di musim lain&lt;/td&gt;&lt;td&gt;Downwelling/sinking&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;Lokasi&lt;/td&gt;&lt;td&gt;Pantai Peru&lt;/td&gt;&lt;td&gt;Selatan Jawa&lt;/td&gt;&lt;td&gt;Laut Banda, Arafura&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;Intensitas&lt;/td&gt;&lt;td&gt;Bisa berubah&lt;/td&gt;&lt;td&gt;Tergantung musim&lt;/td&gt;&lt;td&gt;Bergantian kuat&lt;/td&gt;&lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;
  &lt;/div&gt;

  &lt;h3&gt;2.7 Efek terhadap Nutrien dan Produktivitas&lt;/h3&gt;
  &lt;p&gt;Upwelling membawa air dari lapisan dalam yang &lt;strong&gt;kaya nutrien&lt;/strong&gt; ke zona fotik. Nutrien yang dibawa meliputi:&lt;/p&gt;
  &lt;ul class=&quot;list&quot;&gt;
    &lt;li&gt;&lt;strong&gt;Nitrit&lt;/strong&gt; — sumber nitrogen untuk fitoplankton&lt;/li&gt;
    &lt;li&gt;&lt;strong&gt;Fosfat&lt;/strong&gt; — unsur esensial metabolisme organisme laut&lt;/li&gt;
    &lt;li&gt;&lt;strong&gt;Silikat&lt;/strong&gt; — dibutuhkan diatom untuk membentuk cangkang&lt;/li&gt;
  &lt;/ul&gt;
  &lt;p&gt;Konsentrasi nutrien di area upwelling jauh lebih tinggi dibandingkan air permukaan yang nutriennya telah berkurang akibat konsumsi oleh pertumbuhan fitoplankton.&lt;/p&gt;

  &lt;h3&gt;2.8 Posisi Cahaya, Nutrien, Fitoplankton&lt;/h3&gt;
  &lt;div class=&quot;table-wrap&quot;&gt;
    &lt;table&gt;
      &lt;thead&gt;
        &lt;tr&gt;&lt;th&gt;Zona&lt;/th&gt;&lt;th&gt;Sebelum Upwelling&lt;/th&gt;&lt;th&gt;Setelah Upwelling&lt;/th&gt;&lt;/tr&gt;
      &lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;
          &lt;td&gt;&lt;strong&gt;Zona Fotik&lt;/strong&gt; (ada cahaya)&lt;/td&gt;
          &lt;td&gt;Nutrien + fitoplankton ada, tapi nutrien mulai habis&lt;/td&gt;
          &lt;td&gt;&lt;strong&gt;Subur&lt;/strong&gt; — nutrien baru datang dari bawah, fotosintesis meningkat pesat&lt;/td&gt;
        &lt;/tr&gt;
        &lt;tr&gt;
          &lt;td&gt;&lt;strong&gt;Zona Afotik&lt;/strong&gt; (tanpa cahaya)&lt;/td&gt;
          &lt;td&gt;Kaya nutrien tetapi tanpa cahaya&lt;/td&gt;
          &lt;td&gt;Masih tanpa cahaya, tapi nutrien terbawa ke atas&lt;/td&gt;
        &lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;
  &lt;/div&gt;
  &lt;div class=&quot;highlight&quot;&gt;
    &lt;p&gt;&lt;strong&gt;Kunci ekologi:&lt;/strong&gt; Upwelling mempertemukan dua syarat kehidupan fitoplankton yang normalnya terpisah — &lt;em&gt;cahaya matahari&lt;/em&gt; (di lapisan atas) dan &lt;em&gt;nutrien&lt;/em&gt; (di lapisan bawah) — sehingga menciptakan zona yang sangat produktif.&lt;/p&gt;
  &lt;/div&gt;

  &lt;h3&gt;2.9 Tiga Dampak Utama Upwelling&lt;/h3&gt;
  &lt;div class=&quot;steps&quot;&gt;
    &lt;div class=&quot;step&quot;&gt;
      &lt;div class=&quot;step-num&quot;&gt;1&lt;/div&gt;
      &lt;div class=&quot;step-content&quot;&gt;
        &lt;strong&gt;Meningkatkan Produktivitas Biologis → Mendukung Perikanan&lt;/strong&gt;
        &lt;p&gt;Nutrien yang naik memicu ledakan pertumbuhan fitoplankton (blooming), yang menjadi dasar rantai makanan laut. Daerah upwelling umumnya menjadi daerah penangkapan ikan yang sangat produktif.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;step&quot;&gt;
      &lt;div class=&quot;step-num&quot;&gt;2&lt;/div&gt;
      &lt;div class=&quot;step-content&quot;&gt;
        &lt;strong&gt;Mengubah Cuaca Lokal&lt;/strong&gt;
        &lt;p&gt;Air dingin dari upwelling menyebabkan kondisi cuaca khas: kabut tebal, awan stratus rendah, atmosfer terstratifikasi stabil, konveksi sedikit, dan curah hujan sedikit di daerah pantai yang berdekatan.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;step&quot;&gt;
      &lt;div class=&quot;step-num&quot;&gt;3&lt;/div&gt;
      &lt;div class=&quot;step-content&quot;&gt;
        &lt;strong&gt;Redistribusi Massa Air &amp; Arus Geostropi&lt;/strong&gt;
        &lt;p&gt;Variabilitas spasial transport di samudra terbuka menghasilkan upwelling dan downwelling, yang meredistribusi massa air di lautan, kemudian menggerakkan arus geostropi yang dikendalikan angin melalui mekanisme pemompaan Ekman.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/section&gt;

&lt;!-- ════════════════════════════════════════ --&gt;
&lt;!-- SECTION 3: CHEAT SHEET --&gt;
&lt;!-- ════════════════════════════════════════ --&gt;
&lt;section id=&quot;cheatsheet&quot;&gt;
  &lt;div class=&quot;section-label&quot;&gt;Bagian 3&lt;/div&gt;
  &lt;h2&gt;⚡ Cheat Sheet Ujian&lt;/h2&gt;
  &lt;div class=&quot;cheat-grid&quot;&gt;

    &lt;div class=&quot;cheat-block&quot;&gt;
      &lt;h4&gt;📌 Definisi Utama&lt;/h4&gt;
      &lt;ul&gt;
        &lt;li&gt;Upwelling = air laut naik dari kedalaman ke permukaan&lt;/li&gt;
        &lt;li&gt;Kedalaman sumber: 200–300 m&lt;/li&gt;
        &lt;li&gt;Referensi: Bowden (1983) &amp; Stewart (1983)&lt;/li&gt;
        &lt;li&gt;Lawannya: Downwelling (air turun ke dalam)&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;

    &lt;div class=&quot;cheat-block&quot;&gt;
      &lt;h4&gt;📌 3 Lapisan Laut (Suhu)&lt;/h4&gt;
      &lt;ul&gt;
        &lt;li&gt;Mix Layer → suhu hangat, homogen&lt;/li&gt;
        &lt;li&gt;Thermocline → suhu turun tajam&lt;/li&gt;
        &lt;li&gt;Deep Layer → dingin, stabil, kaya nutrien&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;

    &lt;div class=&quot;cheat-block&quot;&gt;
      &lt;h4&gt;📌 Mekanisme Ekman&lt;/h4&gt;
      &lt;ul&gt;
        &lt;li&gt;Angin → Transpor Ekman (ME) → menjauhi pantai&lt;/li&gt;
        &lt;li&gt;Belahan bumi utara: dibelokkan ke kanan&lt;/li&gt;
        &lt;li&gt;Air bawah naik gantikan air yang pergi&lt;/li&gt;
        &lt;li&gt;Sketsa: angin utara → pantai timur (Stewart 1983)&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;

    &lt;div class=&quot;cheat-block&quot;&gt;
      &lt;h4&gt;📌 3 Proses Upwelling&lt;/h4&gt;
      &lt;ul&gt;
        &lt;li&gt;1. Ekman Pump (angin + transport horizontal)&lt;/li&gt;
        &lt;li&gt;2. Defleksi (gaya Coriolis)&lt;/li&gt;
        &lt;li&gt;3. Pusaran Siklun (cyclonic eddy)&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;

    &lt;div class=&quot;cheat-block&quot;&gt;
      &lt;h4&gt;📌 3 Jenis Upwelling&lt;/h4&gt;
      &lt;ul&gt;
        &lt;li&gt;Stationary → sepanjang tahun → Peru&lt;/li&gt;
        &lt;li&gt;Periodic → 1 musim → Selatan Jawa&lt;/li&gt;
        &lt;li&gt;Alternating → silih berganti sinking → Banda, Arafura&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;

    &lt;div class=&quot;cheat-block&quot;&gt;
      &lt;h4&gt;📌 Nutrien yang Dibawa&lt;/h4&gt;
      &lt;ul&gt;
        &lt;li&gt;Nitrit (N)&lt;/li&gt;
        &lt;li&gt;Fosfat (P)&lt;/li&gt;
        &lt;li&gt;Silikat (Si)&lt;/li&gt;
        &lt;li&gt;→ mendukung pertumbuhan fitoplankton&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;

    &lt;div class=&quot;cheat-block&quot;&gt;
      &lt;h4&gt;📌 Sebelum vs Sesudah Upwelling&lt;/h4&gt;
      &lt;ul&gt;
        &lt;li&gt;Sebelum: nutrien di bawah (afotik), fitoplankton di atas tapi miskin nutrien&lt;/li&gt;
        &lt;li&gt;Sesudah: nutrien naik ke zona fotik → SUBUR&lt;/li&gt;
        &lt;li&gt;Efek: ledakan fitoplankton&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;

    &lt;div class=&quot;cheat-block&quot;&gt;
      &lt;h4&gt;📌 3 Dampak Upwelling&lt;/h4&gt;
      &lt;ul&gt;
        &lt;li&gt;1. Produktivitas biologis → perikanan&lt;/li&gt;
        &lt;li&gt;2. Cuaca lokal: kabut, awan stratus, sedikit hujan&lt;/li&gt;
        &lt;li&gt;3. Redistribusi massa → arus geostropi (Ekman pumping)&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;

    &lt;div class=&quot;cheat-block&quot;&gt;
      &lt;h4&gt;📌 Divergen di Laut Lepas&lt;/h4&gt;
      &lt;ul&gt;
        &lt;li&gt;Pola arus permukaan menyebar (divergence)&lt;/li&gt;
        &lt;li&gt;Kekosongan diisi air dari bawah permukaan&lt;/li&gt;
        &lt;li&gt;Terjadi di laut lepas (bukan hanya pantai)&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;

    &lt;div class=&quot;cheat-block&quot;&gt;
      &lt;h4&gt;📌 Upwelling &amp; Homogenisasi&lt;/h4&gt;
      &lt;ul&gt;
        &lt;li&gt;Upwelling mengaduk lapisan&lt;/li&gt;
        &lt;li&gt;Lapisan menjadi homogen/tercampur&lt;/li&gt;
        &lt;li&gt;Stratifikasi suhu melemah sementara&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;

  &lt;/div&gt;
&lt;/section&gt;

&lt;!-- ════════════════════════════════════════ --&gt;
&lt;!-- SECTION 4: PREDIKSI SOAL --&gt;
&lt;!-- ════════════════════════════════════════ --&gt;
&lt;section id=&quot;soal&quot;&gt;
  &lt;div class=&quot;section-label&quot;&gt;Bagian 4&lt;/div&gt;
  &lt;h2&gt;🎯 Prediksi Soal Ujian (20 Soal)&lt;/h2&gt;
  &lt;p style=&quot;margin-bottom:24px;font-size:14px;&quot;&gt;Klik setiap soal untuk melihat jawaban dan pembahasannya.&lt;/p&gt;

  &lt;!-- Soal 1 --&gt;
  &lt;div class=&quot;soal-item&quot;&gt;
    &lt;div class=&quot;soal-q&quot; onclick=&quot;toggle(this)&quot;&gt;
      &lt;span class=&quot;soal-num&quot;&gt;PG 01&lt;/span&gt;
      &lt;div&gt;
        &lt;p&gt;Apa yang dimaksud dengan upwelling dalam oseanografi?&lt;/p&gt;
        &lt;p class=&quot;toggle-hint&quot;&gt;Klik untuk melihat jawaban ↓&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;soal-a&quot;&gt;
      &lt;div class=&quot;jawaban-label&quot;&gt;Jawaban&lt;/div&gt;
      &lt;p&gt;&lt;strong&gt;Upwelling&lt;/strong&gt; adalah istilah yang digunakan untuk menggambarkan proses-proses yang menyebabkan air laut bergerak ke atas dari suatu kedalaman tertentu menuju lapisan permukaan. Kedalaman lapisan upwelling biasanya berkisar &lt;strong&gt;200–300 m&lt;/strong&gt; (Bowden, 1983; Stewart, 1983).&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Soal 2 --&gt;
  &lt;div class=&quot;soal-item&quot;&gt;
    &lt;div class=&quot;soal-q&quot; onclick=&quot;toggle(this)&quot;&gt;
      &lt;span class=&quot;soal-num&quot;&gt;PG 02&lt;/span&gt;
      &lt;div&gt;
        &lt;p&gt;Sebutkan tiga lapisan utama dalam distribusi vertikal suhu laut beserta karakteristiknya!&lt;/p&gt;
        &lt;p class=&quot;toggle-hint&quot;&gt;Klik untuk melihat jawaban ↓&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;soal-a&quot;&gt;
      &lt;div class=&quot;jawaban-label&quot;&gt;Jawaban&lt;/div&gt;
      &lt;p&gt;Tiga lapisan vertikal suhu laut: &lt;strong&gt;(1) Mix Layer&lt;/strong&gt; — lapisan atas, suhu hangat dan relatif homogen akibat pencampuran oleh angin; &lt;strong&gt;(2) Thermocline&lt;/strong&gt; — lapisan transisi di mana suhu menurun tajam dengan bertambahnya kedalaman; &lt;strong&gt;(3) Deep Layer&lt;/strong&gt; — lapisan terbawah, suhu dingin dan stabil, kaya nutrien namun minim cahaya.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Soal 3 --&gt;
  &lt;div class=&quot;soal-item&quot;&gt;
    &lt;div class=&quot;soal-q&quot; onclick=&quot;toggle(this)&quot;&gt;
      &lt;span class=&quot;soal-num&quot;&gt;Esai 03&lt;/span&gt;
      &lt;div&gt;
        &lt;p&gt;Jelaskan mekanisme terjadinya upwelling akibat Transpor Ekman di belahan bumi utara!&lt;/p&gt;
        &lt;p class=&quot;toggle-hint&quot;&gt;Klik untuk melihat jawaban ↓&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;soal-a&quot;&gt;
      &lt;div class=&quot;jawaban-label&quot;&gt;Jawaban&lt;/div&gt;
      &lt;p&gt;Di belahan bumi utara, angin utara yang bertiup sepanjang pantai timur menggerakkan massa air permukaan. Akibat gaya Coriolis, aliran ini dibelokkan ke kanan (menjauhi pantai) — inilah &lt;strong&gt;Transpor Ekman (ME)&lt;/strong&gt;. Ketika massa air permukaan bergerak menjauhi pantai, terjadi kekosongan di daerah pantai yang harus diisi. Air pengisi ini berasal dari lapisan bawah (100–300 m), yang naik ke permukaan → itulah upwelling. Tampak atas: angin + ME menjauhi pantai. Penampang melintang: air naik menggantikan air yang pergi (Stewart, 1983).&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Soal 4 --&gt;
  &lt;div class=&quot;soal-item&quot;&gt;
    &lt;div class=&quot;soal-q&quot; onclick=&quot;toggle(this)&quot;&gt;
      &lt;span class=&quot;soal-num&quot;&gt;PG 04&lt;/span&gt;
      &lt;div&gt;
        &lt;p&gt;Berapa kedalaman lapisan upwelling pada umumnya menurut Bowden (1983) dan Stewart (1983)?&lt;br&gt;a) 50–100 m &amp;nbsp; b) 100–200 m &amp;nbsp; c) 200–300 m &amp;nbsp; d) 300–500 m&lt;/p&gt;
        &lt;p class=&quot;toggle-hint&quot;&gt;Klik untuk melihat jawaban ↓&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;soal-a&quot;&gt;
      &lt;div class=&quot;jawaban-label&quot;&gt;Jawaban: C&lt;/div&gt;
      &lt;p&gt;Menurut Bowden (1983) dan Stewart (1983), kedalaman lapisan upwelling biasanya berkisar &lt;strong&gt;200–300 m&lt;/strong&gt;. Ini merupakan kedalaman yang berada di bawah thermocline, di mana air masih kaya nutrien.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Soal 5 --&gt;
  &lt;div class=&quot;soal-item&quot;&gt;
    &lt;div class=&quot;soal-q&quot; onclick=&quot;toggle(this)&quot;&gt;
      &lt;span class=&quot;soal-num&quot;&gt;Esai 05&lt;/span&gt;
      &lt;div&gt;
        &lt;p&gt;Sebutkan dan jelaskan tiga proses terjadinya upwelling berdasarkan mekanismenya!&lt;/p&gt;
        &lt;p class=&quot;toggle-hint&quot;&gt;Klik untuk melihat jawaban ↓&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;soal-a&quot;&gt;
      &lt;div class=&quot;jawaban-label&quot;&gt;Jawaban&lt;/div&gt;
      &lt;p&gt;&lt;strong&gt;(1) Ekman Pump:&lt;/strong&gt; Angin mendorong Transpor Ekman horizontal yang membawa air permukaan menjauhi pantai; air dalam naik menggantikannya. &lt;strong&gt;(2) Defleksi:&lt;/strong&gt; Gaya Coriolis membelokkan aliran massa air sehingga terjadi komponen vertikal yang mengangkat air dalam ke permukaan. &lt;strong&gt;(3) Pusaran Siklun (Cyclonic Eddy):&lt;/strong&gt; Pola arus melingkar siklonik menciptakan divergensi di pusat pusaran, mendorong air bawah naik secara terlokalisasi.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Soal 6 --&gt;
  &lt;div class=&quot;soal-item&quot;&gt;
    &lt;div class=&quot;soal-q&quot; onclick=&quot;toggle(this)&quot;&gt;
      &lt;span class=&quot;soal-num&quot;&gt;PG 06&lt;/span&gt;
      &lt;div&gt;
        &lt;p&gt;Jenis upwelling yang terjadi sepanjang tahun meskipun intensitasnya berubah adalah...&lt;br&gt;a) Alternating type &amp;nbsp; b) Periodic type &amp;nbsp; c) Stationary type &amp;nbsp; d) Cyclonic type&lt;/p&gt;
        &lt;p class=&quot;toggle-hint&quot;&gt;Klik untuk melihat jawaban ↓&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;soal-a&quot;&gt;
      &lt;div class=&quot;jawaban-label&quot;&gt;Jawaban: C&lt;/div&gt;
      &lt;p&gt;&lt;strong&gt;Stationary type (jenis tetap)&lt;/strong&gt; terjadi sepanjang tahun meskipun intensitasnya dapat berubah-ubah. Tipe ini merupakan upwelling yang terjadi di lepas pantai Peru, didukung oleh angin pasat yang konsisten sepanjang tahun.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Soal 7 --&gt;
  &lt;div class=&quot;soal-item&quot;&gt;
    &lt;div class=&quot;soal-q&quot; onclick=&quot;toggle(this)&quot;&gt;
      &lt;span class=&quot;soal-num&quot;&gt;Esai 07&lt;/span&gt;
      &lt;div&gt;
        &lt;p&gt;Apa yang dimaksud dengan upwelling jenis &quot;alternating type&quot;? Berikan contoh lokasinya!&lt;/p&gt;
        &lt;p class=&quot;toggle-hint&quot;&gt;Klik untuk melihat jawaban ↓&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;soal-a&quot;&gt;
      &lt;div class=&quot;jawaban-label&quot;&gt;Jawaban&lt;/div&gt;
      &lt;p&gt;&lt;strong&gt;Alternating type (jenis silih berganti)&lt;/strong&gt; adalah upwelling yang terjadi secara bergantian dengan penenggelaman massa air (&lt;em&gt;sinking&lt;/em&gt;). Dalam satu musim, air ringan di lapisan permukaan bergerak keluar dari lokasi upwelling, dan air lebih berat dari lapisan bawah naik ke atas kemudian tenggelam. Musim berikutnya pola berbalik. Lokasi contoh: &lt;strong&gt;Laut Banda dan Laut Arafura&lt;/strong&gt;.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Soal 8 --&gt;
  &lt;div class=&quot;soal-item&quot;&gt;
    &lt;div class=&quot;soal-q&quot; onclick=&quot;toggle(this)&quot;&gt;
      &lt;span class=&quot;soal-num&quot;&gt;PG 08&lt;/span&gt;
      &lt;div&gt;
        &lt;p&gt;Upwelling jenis berkala (periodic type) terjadi di daerah...&lt;br&gt;a) Pantai Peru &amp;nbsp; b) Laut Banda &amp;nbsp; c) Selatan Jawa &amp;nbsp; d) Laut Arafura&lt;/p&gt;
        &lt;p class=&quot;toggle-hint&quot;&gt;Klik untuk melihat jawaban ↓&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;soal-a&quot;&gt;
      &lt;div class=&quot;jawaban-label&quot;&gt;Jawaban: C&lt;/div&gt;
      &lt;p&gt;Upwelling jenis berkala (&lt;em&gt;periodic type&lt;/em&gt;) terjadi hanya selama satu musim. Contoh lokasinya adalah &lt;strong&gt;Perairan Selatan Jawa&lt;/strong&gt;, yang mengalami upwelling pada musim tenggara ketika angin mendorong Transpor Ekman menjauhi pantai selatan Jawa.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Soal 9 --&gt;
  &lt;div class=&quot;soal-item&quot;&gt;
    &lt;div class=&quot;soal-q&quot; onclick=&quot;toggle(this)&quot;&gt;
      &lt;span class=&quot;soal-num&quot;&gt;Konsep 09&lt;/span&gt;
      &lt;div&gt;
        &lt;p&gt;Bagaimana proses divergensi arus dapat memicu upwelling di laut lepas?&lt;/p&gt;
        &lt;p class=&quot;toggle-hint&quot;&gt;Klik untuk melihat jawaban ↓&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;soal-a&quot;&gt;
      &lt;div class=&quot;jawaban-label&quot;&gt;Jawaban&lt;/div&gt;
      &lt;p&gt;Di laut lepas, upwelling dapat terjadi karena pola arus permukaan yang &lt;strong&gt;menyebar (divergence)&lt;/strong&gt; — arus bergerak ke berbagai arah dari satu titik atau zona. Kondisi ini menciptakan kekurangan massa air di permukaan. Untuk mengisi kekosongan tersebut, massa air dari lapisan bawah permukaan mengalir ke atas. Proses ini berbeda dari upwelling pantai yang didominasi oleh efek batas benua dan Transpor Ekman lateral.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Soal 10 --&gt;
  &lt;div class=&quot;soal-item&quot;&gt;
    &lt;div class=&quot;soal-q&quot; onclick=&quot;toggle(this)&quot;&gt;
      &lt;span class=&quot;soal-num&quot;&gt;Esai 10&lt;/span&gt;
      &lt;div&gt;
        &lt;p&gt;Jelaskan dampak upwelling terhadap konsentrasi nutrien di permukaan laut dan kaitannya dengan produktivitas biologis!&lt;/p&gt;
        &lt;p class=&quot;toggle-hint&quot;&gt;Klik untuk melihat jawaban ↓&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;soal-a&quot;&gt;
      &lt;div class=&quot;jawaban-label&quot;&gt;Jawaban&lt;/div&gt;
      &lt;p&gt;Upwelling membawa air dari lapisan dalam yang kaya &lt;strong&gt;nitrit, fosfat, dan silikat&lt;/strong&gt; ke zona fotik (zona yang mendapat cahaya). Di permukaan laut, nutrien-nutrien ini telah habis dikonsumsi oleh pertumbuhan fitoplankton. Dengan datangnya air dari dalam, nutrien berlimpah kembali tersedia di zona fotik di mana cahaya matahari cukup untuk fotosintesis. Akibatnya, fitoplankton tumbuh pesat (blooming), yang kemudian mendukung zooplankton, ikan kecil, hingga ikan-ikan besar — menjadikan daerah upwelling sebagai kawasan perikanan yang sangat produktif.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Soal 11 --&gt;
  &lt;div class=&quot;soal-item&quot;&gt;
    &lt;div class=&quot;soal-q&quot; onclick=&quot;toggle(this)&quot;&gt;
      &lt;span class=&quot;soal-num&quot;&gt;PG 11&lt;/span&gt;
      &lt;div&gt;
        &lt;p&gt;Nutrien berikut yang dibawa oleh upwelling dari lapisan dalam ke permukaan adalah...&lt;br&gt;a) Nitrat, sulfat, dan karbonat &amp;nbsp; b) Nitrit, fosfat, dan silikat &amp;nbsp; c) Oksigen, nitrogen, dan hidrogen &amp;nbsp; d) Klorofil, karbon, dan yodium&lt;/p&gt;
        &lt;p class=&quot;toggle-hint&quot;&gt;Klik untuk melihat jawaban ↓&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;soal-a&quot;&gt;
      &lt;div class=&quot;jawaban-label&quot;&gt;Jawaban: B&lt;/div&gt;
      &lt;p&gt;Upwelling membawa &lt;strong&gt;nitrit, fosfat, dan silikat&lt;/strong&gt; dari lapisan dalam ke permukaan. Senyawa-senyawa ini merupakan nutrien utama yang dibutuhkan fitoplankton untuk tumbuh, dan konsentrasinya di lapisan dalam jauh lebih tinggi karena proses dekomposisi organisme yang tenggelam.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Soal 12 --&gt;
  &lt;div class=&quot;soal-item&quot;&gt;
    &lt;div class=&quot;soal-q&quot; onclick=&quot;toggle(this)&quot;&gt;
      &lt;span class=&quot;soal-num&quot;&gt;Konsep 12&lt;/span&gt;
      &lt;div&gt;
        &lt;p&gt;Mengapa daerah di sekitar kawasan upwelling cenderung memiliki cuaca berupa kabut dan sedikit hujan?&lt;/p&gt;
        &lt;p class=&quot;toggle-hint&quot;&gt;Klik untuk melihat jawaban ↓&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;soal-a&quot;&gt;
      &lt;div class=&quot;jawaban-label&quot;&gt;Jawaban&lt;/div&gt;
      &lt;p&gt;Air yang naik melalui upwelling berasal dari kedalaman 200–300 m yang bersuhu &lt;strong&gt;sangat dingin&lt;/strong&gt;. Ketika udara hangat dari daratan atau laut lepas bergerak di atas permukaan air yang dingin ini, kelembaban udara berkondensasi membentuk &lt;strong&gt;kabut dan awan stratus rendah&lt;/strong&gt;. Suhu permukaan yang dingin menciptakan lapisan atmosfer yang sangat stabil (dingin di bawah, lebih hangat di atas), yang menekan konveksi ke atas. Tanpa konveksi yang kuat, tidak terbentuk awan cumulonimbus, sehingga &lt;strong&gt;konveksi sedikit dan curah hujan sangat minim&lt;/strong&gt;.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Soal 13 --&gt;
  &lt;div class=&quot;soal-item&quot;&gt;
    &lt;div class=&quot;soal-q&quot; onclick=&quot;toggle(this)&quot;&gt;
      &lt;span class=&quot;soal-num&quot;&gt;Esai 13&lt;/span&gt;
      &lt;div&gt;
        &lt;p&gt;Bandingkan kondisi posisi cahaya, nutrien, dan fitoplankton sebelum dan sesudah terjadinya upwelling!&lt;/p&gt;
        &lt;p class=&quot;toggle-hint&quot;&gt;Klik untuk melihat jawaban ↓&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;soal-a&quot;&gt;
      &lt;div class=&quot;jawaban-label&quot;&gt;Jawaban&lt;/div&gt;
      &lt;p&gt;&lt;strong&gt;Sebelum upwelling:&lt;/strong&gt; Zona fotik (permukaan) memiliki cahaya dan fitoplankton, tetapi nutrien terbatas karena sudah dihabiskan. Zona afotik (dalam) kaya nutrien tetapi tanpa cahaya — kondisi ini memisahkan kedua syarat kehidupan. &lt;strong&gt;Sesudah upwelling:&lt;/strong&gt; Nutrien dari zona afotik terangkat ke zona fotik. Di zona fotik kini tersedia cahaya sekaligus nutrien, menciptakan kondisi &lt;em&gt;subur&lt;/em&gt;. Fitoplankton tumbuh pesat, produktivitas meningkat drastis. Zona afotik yang tersisa tetap tanpa cahaya, tetapi nutrien sudah terbawa ke atas.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Soal 14 --&gt;
  &lt;div class=&quot;soal-item&quot;&gt;
    &lt;div class=&quot;soal-q&quot; onclick=&quot;toggle(this)&quot;&gt;
      &lt;span class=&quot;soal-num&quot;&gt;PG 14&lt;/span&gt;
      &lt;div&gt;
        &lt;p&gt;Pernyataan mana yang BENAR mengenai dampak upwelling terhadap lapisan air laut?&lt;br&gt;a) Upwelling meningkatkan stratifikasi suhu laut&lt;br&gt;b) Upwelling mengaduk lapisan sehingga menjadi homogen/tercampur&lt;br&gt;c) Upwelling hanya mempengaruhi lapisan thermocline&lt;br&gt;d) Upwelling menghilangkan nutrien dari permukaan&lt;/p&gt;
        &lt;p class=&quot;toggle-hint&quot;&gt;Klik untuk melihat jawaban ↓&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;soal-a&quot;&gt;
      &lt;div class=&quot;jawaban-label&quot;&gt;Jawaban: B&lt;/div&gt;
      &lt;p&gt;Upwelling &lt;strong&gt;mengaduk seluruh lapisan sehingga menjadi homogen/tercampur&lt;/strong&gt;. Proses pengangkatan air dari bawah menciptakan turbulensi yang mencampur lapisan-lapisan air yang sebelumnya terstratifikasi, sehingga perbedaan suhu dan densitas antar lapisan menjadi lebih kecil atau hilang sementara.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Soal 15 --&gt;
  &lt;div class=&quot;soal-item&quot;&gt;
    &lt;div class=&quot;soal-q&quot; onclick=&quot;toggle(this)&quot;&gt;
      &lt;span class=&quot;soal-num&quot;&gt;Konsep 15&lt;/span&gt;
      &lt;div&gt;
        &lt;p&gt;Apa hubungan antara upwelling, downwelling, dan arus geostropi melalui mekanisme pemompaan Ekman?&lt;/p&gt;
        &lt;p class=&quot;toggle-hint&quot;&gt;Klik untuk melihat jawaban ↓&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;soal-a&quot;&gt;
      &lt;div class=&quot;jawaban-label&quot;&gt;Jawaban&lt;/div&gt;
      &lt;p&gt;Variabilitas spasial transport (Ekman) di samudra terbuka tidak merata — di beberapa tempat transport konvergen (menumpuk = downwelling), di tempat lain divergen (kosong = upwelling). Perbedaan distribusi massa air ini menciptakan &lt;strong&gt;gradien tekanan horizontal&lt;/strong&gt; di lautan. Gradien tekanan ini, dikombinasikan dengan gaya Coriolis, menggerakkan &lt;strong&gt;arus geostropi&lt;/strong&gt;. Jadi: angin → Transpor Ekman → upwelling/downwelling → redistribusi massa → arus geostropi. Ini adalah salah satu mekanisme penggerak sirkulasi samudra berskala besar.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Soal 16 --&gt;
  &lt;div class=&quot;soal-item&quot;&gt;
    &lt;div class=&quot;soal-q&quot; onclick=&quot;toggle(this)&quot;&gt;
      &lt;span class=&quot;soal-num&quot;&gt;PG 16&lt;/span&gt;
      &lt;div&gt;
        &lt;p&gt;Upwelling berkala (periodic type) yang terjadi di Selatan Jawa dipicu oleh musim apa?&lt;br&gt;a) Musim barat (angin barat) &amp;nbsp; b) Musim pancaroba &amp;nbsp; c) Musim tenggara (angin tenggara) &amp;nbsp; d) Musim hujan&lt;/p&gt;
        &lt;p class=&quot;toggle-hint&quot;&gt;Klik untuk melihat jawaban ↓&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;soal-a&quot;&gt;
      &lt;div class=&quot;jawaban-label&quot;&gt;Jawaban: C&lt;/div&gt;
      &lt;p&gt;Upwelling di Selatan Jawa terjadi pada &lt;strong&gt;musim tenggara&lt;/strong&gt; (angin tenggara), sekitar bulan Juni–Agustus. Angin tenggara yang bertiup sejajar pantai selatan Jawa mendorong Transpor Ekman ke arah barat daya (menjauhi pantai), sehingga air dari lapisan dalam naik ke permukaan. Ini adalah contoh periodic type karena hanya terjadi satu musim.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Soal 17 --&gt;
  &lt;div class=&quot;soal-item&quot;&gt;
    &lt;div class=&quot;soal-q&quot; onclick=&quot;toggle(this)&quot;&gt;
      &lt;span class=&quot;soal-num&quot;&gt;Esai 17&lt;/span&gt;
      &lt;div&gt;
        &lt;p&gt;Jelaskan perbedaan antara upwelling pantai (coastal upwelling) yang disebabkan Transpor Ekman dengan upwelling di laut lepas yang disebabkan divergensi arus!&lt;/p&gt;
        &lt;p class=&quot;toggle-hint&quot;&gt;Klik untuk melihat jawaban ↓&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;soal-a&quot;&gt;
      &lt;div class=&quot;jawaban-label&quot;&gt;Jawaban&lt;/div&gt;
      &lt;p&gt;&lt;strong&gt;Upwelling pantai:&lt;/strong&gt; Terjadi di kawasan pesisir. Angin sejajar pantai mendorong Transpor Ekman yang membawa massa air permukaan menjauh dari pantai. Air dalam naik mengisi kekosongan di dekat pantai. Sangat tergantung pada posisi pantai, arah angin, dan gaya Coriolis. Contoh: pantai barat Amerika Selatan (Peru), Selatan Jawa. &lt;strong&gt;Upwelling laut lepas (divergensi):&lt;/strong&gt; Terjadi di tengah samudra. Pola arus permukaan yang menyebar (divergen) dari satu zona menciptakan kekosongan yang diisi air dari bawah. Tidak memerlukan batas pantai. Contoh: zona divergensi di ekuator dan zona konvergen siklonik.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Soal 18 --&gt;
  &lt;div class=&quot;soal-item&quot;&gt;
    &lt;div class=&quot;soal-q&quot; onclick=&quot;toggle(this)&quot;&gt;
      &lt;span class=&quot;soal-num&quot;&gt;PG 18&lt;/span&gt;
      &lt;div&gt;
        &lt;p&gt;Manakah pernyataan yang TIDAK tepat mengenai upwelling jenis stationary?&lt;br&gt;a) Terjadi sepanjang tahun&lt;br&gt;b) Intensitasnya selalu konstan&lt;br&gt;c) Terjadi di lepas pantai Peru&lt;br&gt;d) Intensitasnya dapat berubah-ubah&lt;/p&gt;
        &lt;p class=&quot;toggle-hint&quot;&gt;Klik untuk melihat jawaban ↓&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;soal-a&quot;&gt;
      &lt;div class=&quot;jawaban-label&quot;&gt;Jawaban: B&lt;/div&gt;
      &lt;p&gt;Pernyataan yang TIDAK tepat adalah &lt;strong&gt;B: &quot;Intensitasnya selalu konstan&quot;&lt;/strong&gt;. Menurut materi, upwelling stationary type memang terjadi sepanjang tahun, NAMUN intensitasnya &lt;em&gt;dapat berubah-ubah&lt;/em&gt; (tidak selalu konstan). Hal ini bergantung pada kekuatan angin pasat dan faktor-faktor meteorologis lainnya.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Soal 19 --&gt;
  &lt;div class=&quot;soal-item&quot;&gt;
    &lt;div class=&quot;soal-q&quot; onclick=&quot;toggle(this)&quot;&gt;
      &lt;span class=&quot;soal-num&quot;&gt;Esai 19&lt;/span&gt;
      &lt;div&gt;
        &lt;p&gt;Mengapa daerah upwelling seperti perairan Peru menjadi salah satu kawasan penangkapan ikan terkaya di dunia? Jelaskan rantai prosesnya!&lt;/p&gt;
        &lt;p class=&quot;toggle-hint&quot;&gt;Klik untuk melihat jawaban ↓&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;soal-a&quot;&gt;
      &lt;div class=&quot;jawaban-label&quot;&gt;Jawaban&lt;/div&gt;
      &lt;p&gt;Rantai proses: &lt;strong&gt;Angin pasat&lt;/strong&gt; → mendorong Transpor Ekman menjauhi pantai Peru → &lt;strong&gt;upwelling&lt;/strong&gt; terjadi → air dingin kaya &lt;strong&gt;nitrit, fosfat, silikat&lt;/strong&gt; naik ke zona fotik → nutrien bertemu cahaya matahari → &lt;strong&gt;fitoplankton&lt;/strong&gt; tumbuh pesat (blooming) → fitoplankton dimakan &lt;strong&gt;zooplankton&lt;/strong&gt; → zooplankton dimakan &lt;strong&gt;ikan kecil (anchovy/teri)&lt;/strong&gt; → ikan kecil dimakan &lt;strong&gt;ikan besar dan burung laut&lt;/strong&gt;. Hasilnya adalah ekosistem laut yang sangat produktif, menjadikan Peru salah satu produsen ikan terbesar di dunia. Inilah mengapa upwelling disebut &quot;meningkatkan produktivitas biologis yang mendukung perikanan&quot;.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Soal 20 --&gt;
  &lt;div class=&quot;soal-item&quot;&gt;
    &lt;div class=&quot;soal-q&quot; onclick=&quot;toggle(this)&quot;&gt;
      &lt;span class=&quot;soal-num&quot;&gt;Konsep 20&lt;/span&gt;
      &lt;div&gt;
        &lt;p&gt;Apa yang menyebabkan terjadinya pergerakan air vertikal (upwelling atau downwelling) di kawasan pesisir selain karena tiupan angin secara horizontal?&lt;/p&gt;
        &lt;p class=&quot;toggle-hint&quot;&gt;Klik untuk melihat jawaban ↓&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;soal-a&quot;&gt;
      &lt;div class=&quot;jawaban-label&quot;&gt;Jawaban&lt;/div&gt;
      &lt;p&gt;Selain pergerakan horizontal akibat tiupan angin, pergerakan massa air secara vertikal juga dapat terjadi karena &lt;strong&gt;gradien tekanan&lt;/strong&gt;. Pergerakan horizontal di kawasan pesisir menciptakan perbedaan tekanan antara perairan di pinggir pantai dan perairan di luar pantai (laut lepas). Gradien tekanan ini kemudian mendorong massa air bergerak secara vertikal — ke atas (upwelling) atau ke bawah (downwelling) — untuk menyeimbangkan tekanan. Jadi faktor pemicu vertikal dapat berupa: gradien tekanan, gaya Coriolis (defleksi), dan pusaran siklonik, tidak hanya angin langsung.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

&lt;/section&gt;
