  &lt;!-- PILIHAN GANDA --&gt;
  &lt;h3 style=&quot;background:var(--ocean-deep);color:white;padding:10px 18px;border-radius:8px;margin-bottom:16px;&quot;&gt;📝 A. Pilihan Ganda&lt;/h3&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;01&lt;/span&gt; Pasang surut didefinisikan sebagai fenomena naik turunnya permukaan air laut secara periodik yang disebabkan oleh... &lt;span class=&quot;qa-type&quot;&gt;Pilihan Ganda&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;ul class=&quot;mc-options&quot;&gt;
        &lt;li&gt;Angin dan tekanan atmosfer&lt;/li&gt;
        &lt;li class=&quot;correct&quot;&gt;Kombinasi gravitasi dan gaya tarik benda-benda astronomi (Matahari, Bumi, Bulan)&lt;/li&gt;
        &lt;li&gt;Rotasi Bumi saja&lt;/li&gt;
        &lt;li&gt;Pergerakan lempeng tektonik&lt;/li&gt;
        &lt;li&gt;Arus laut dalam&lt;/li&gt;
      &lt;/ul&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban: B&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;&lt;strong&gt;Pembahasan:&lt;/strong&gt; Pasang surut disebabkan oleh kombinasi gravitasi dan gaya tarik menarik benda-benda astronomi, terutama Matahari, Bumi, dan Bulan. Faktor astronomi inilah yang menjadi penyebab utama, bukan faktor meteorologi seperti angin atau tekanan.&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;02&lt;/span&gt; Teori Kesetimbangan pasang surut pertama kali diperkenalkan oleh... &lt;span class=&quot;qa-type&quot;&gt;Pilihan Ganda&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;ul class=&quot;mc-options&quot;&gt;
        &lt;li&gt;Albert Einstein&lt;/li&gt;
        &lt;li&gt;Galileo Galilei&lt;/li&gt;
        &lt;li class=&quot;correct&quot;&gt;Sir Isaac Newton&lt;/li&gt;
        &lt;li&gt;Charles Darwin&lt;/li&gt;
        &lt;li&gt;Pierre-Simon Laplace&lt;/li&gt;
      &lt;/ul&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban: C&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;&lt;strong&gt;Pembahasan:&lt;/strong&gt; Teori Kesetimbangan (Equilibrium Theory) pertama kali diperkenalkan oleh Sir Isaac Newton (1642–1727). Teori ini menjelaskan sifat-sifat pasang surut secara kualitatif berdasarkan gaya gravitasi.&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;03&lt;/span&gt; Pasang Purnama (Spring Tide) terjadi pada kondisi posisi Bumi, Bulan, dan Matahari... &lt;span class=&quot;qa-type&quot;&gt;Pilihan Ganda&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;ul class=&quot;mc-options&quot;&gt;
        &lt;li&gt;Membentuk segitiga sama sisi&lt;/li&gt;
        &lt;li&gt;Membentuk sudut 90 derajat&lt;/li&gt;
        &lt;li&gt;Membentuk sudut 45 derajat&lt;/li&gt;
        &lt;li class=&quot;correct&quot;&gt;Berada dalam satu garis lurus&lt;/li&gt;
        &lt;li&gt;Membentuk sudut 120 derajat&lt;/li&gt;
      &lt;/ul&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban: D&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;&lt;strong&gt;Pembahasan:&lt;/strong&gt; Pasang Purnama terjadi saat Bumi, Bulan, dan Matahari berada dalam satu garis lurus. Kondisi ini terjadi pada saat Bulan Baru dan Bulan Purnama. Pada kondisi ini, gaya tarik Bulan dan Matahari bekerja searah sehingga menghasilkan pasang yang sangat tinggi dan surut yang sangat rendah.&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;04&lt;/span&gt; Tipe pasang surut yang terjadi di Selat Malaka dan Laut Andaman adalah... &lt;span class=&quot;qa-type&quot;&gt;Pilihan Ganda&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;ul class=&quot;mc-options&quot;&gt;
        &lt;li class=&quot;correct&quot;&gt;Semi-Diurnal (Harian Ganda)&lt;/li&gt;
        &lt;li&gt;Diurnal (Harian Tunggal)&lt;/li&gt;
        &lt;li&gt;Mixed Prevailing Diurnal&lt;/li&gt;
        &lt;li&gt;Mixed Prevailing Semi-Diurnal&lt;/li&gt;
        &lt;li&gt;Tidal Bore&lt;/li&gt;
      &lt;/ul&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban: A&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;&lt;strong&gt;Pembahasan:&lt;/strong&gt; Selat Malaka dan Laut Andaman mengalami tipe pasang surut Semi-Diurnal, yaitu 2 kali pasang tinggi dan 2 kali pasang rendah per hari dengan ketinggian yang hampir sama. Sedangkan Selat Karimata mengalami tipe Diurnal.&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;05&lt;/span&gt; Salah satu faktor penyebab pasang surut menurut Teori Dinamis adalah... &lt;span class=&quot;qa-type&quot;&gt;Pilihan Ganda&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;ul class=&quot;mc-options&quot;&gt;
        &lt;li&gt;Revolusi Bumi terhadap Matahari&lt;/li&gt;
        &lt;li&gt;Revolusi Bulan terhadap Matahari&lt;/li&gt;
        &lt;li&gt;Rotasi Bumi pada sumbunya&lt;/li&gt;
        &lt;li class=&quot;correct&quot;&gt;Gaya Coriolis akibat rotasi Bumi&lt;/li&gt;
        &lt;li&gt;Distribusi massa air yang seragam&lt;/li&gt;
      &lt;/ul&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban: D&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;&lt;strong&gt;Pembahasan:&lt;/strong&gt; Menurut Teori Dinamis, faktor penyebab pasang surut meliputi: (1) Kedalaman dan luas perairan, (2) Pengaruh rotasi Bumi/Gaya Coriolis, dan (3) Gesekan dasar. Pilihan A, B, C merupakan faktor menurut Teori Kesetimbangan.&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;06&lt;/span&gt; Pasang surut harian tunggal (Diurnal Tide) ditandai dengan... &lt;span class=&quot;qa-type&quot;&gt;Pilihan Ganda&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;ul class=&quot;mc-options&quot;&gt;
        &lt;li&gt;2 kali pasang tinggi dan 2 kali pasang rendah per hari dengan ketinggian sama&lt;/li&gt;
        &lt;li&gt;2 kali pasang tinggi dan 2 kali pasang rendah per hari dengan ketinggian berbeda&lt;/li&gt;
        &lt;li class=&quot;correct&quot;&gt;1 kali pasang tinggi dan 1 kali pasang rendah per hari&lt;/li&gt;
        &lt;li&gt;3 kali pasang tinggi dan 3 kali pasang rendah per hari&lt;/li&gt;
        &lt;li&gt;Pasang terjadi setiap minggu sekali&lt;/li&gt;
      &lt;/ul&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban: C&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;&lt;strong&gt;Pembahasan:&lt;/strong&gt; Pasang surut harian tunggal (Diurnal Tide) terjadi satu siklus dalam ~24 jam: 1 kali pasang tinggi dan 1 kali pasang rendah per hari. Ini berbeda dengan Semi-Diurnal (2 siklus sehari dengan ketinggian sama) dan Mixed (2 siklus sehari dengan ketinggian berbeda).&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;07&lt;/span&gt; Saat konjungsi, posisi Bulan berada... &lt;span class=&quot;qa-type&quot;&gt;Pilihan Ganda&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;ul class=&quot;mc-options&quot;&gt;
        &lt;li&gt;Di sisi berlawanan dari Bumi terhadap Matahari&lt;/li&gt;
        &lt;li&gt;Membentuk sudut 90° dengan Bumi dan Matahari&lt;/li&gt;
        &lt;li class=&quot;correct&quot;&gt;Di antara Bumi dan Matahari (Bulan Baru)&lt;/li&gt;
        &lt;li&gt;Di belakang Matahari jika dilihat dari Bumi&lt;/li&gt;
        &lt;li&gt;Sejajar dengan garis khatulistiwa&lt;/li&gt;
      &lt;/ul&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban: C&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;&lt;strong&gt;Pembahasan:&lt;/strong&gt; Konjungsi adalah posisi di mana Bulan berada di antara Bumi dan Matahari. Pada saat ini, sisi Bulan yang menghadap Bumi tidak menerima cahaya Matahari sehingga tampak gelap — ini disebut fase Bulan Baru (New Moon). Sebaliknya, Oposisi terjadi saat Bulan berada di sisi berlawanan → Bulan Purnama.&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;08&lt;/span&gt; Fenomena &quot;Pasang Perbani&quot; atau Neap Tide akan menghasilkan kondisi... &lt;span class=&quot;qa-type&quot;&gt;Pilihan Ganda&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;ul class=&quot;mc-options&quot;&gt;
        &lt;li&gt;Pasang sangat tinggi dan surut sangat rendah&lt;/li&gt;
        &lt;li class=&quot;correct&quot;&gt;Pasang rendah dan surut yang tidak terlalu dalam (range kecil)&lt;/li&gt;
        &lt;li&gt;Pasang sedang dan surut sedang&lt;/li&gt;
        &lt;li&gt;Tidak ada pasang maupun surut&lt;/li&gt;
        &lt;li&gt;Pasang dua kali lebih tinggi dari biasanya&lt;/li&gt;
      &lt;/ul&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban: B&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;&lt;strong&gt;Pembahasan:&lt;/strong&gt; Pasang Perbani (Neap Tide) terjadi saat Bumi-Bulan-Matahari membentuk sudut 90°. Dalam kondisi ini, gaya tarik Bulan dan Matahari saling berlawanan arah sehingga melemahkan satu sama lain. Hasilnya adalah pasang rendah dan surut yang tidak terlalu dalam (tidal range kecil).&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;09&lt;/span&gt; Menurut Teori Kesetimbangan, asumsi yang digunakan untuk Bumi adalah... &lt;span class=&quot;qa-type&quot;&gt;Pilihan Ganda&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;ul class=&quot;mc-options&quot;&gt;
        &lt;li&gt;Bumi berbentuk elips, 70% tertutup air&lt;/li&gt;
        &lt;li class=&quot;correct&quot;&gt;Bumi berbentuk bulat sempurna, seluruh permukaannya tertutup air dengan distribusi massa seragam, mengabaikan kelembaman (inertia)&lt;/li&gt;
        &lt;li&gt;Bumi tidak berotasi dan tidak berevolusi&lt;/li&gt;
        &lt;li&gt;Bumi memiliki gravitasi nol di permukaan laut&lt;/li&gt;
        &lt;li&gt;Kedalaman lautan di seluruh dunia sama&lt;/li&gt;
      &lt;/ul&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban: B&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;&lt;strong&gt;Pembahasan:&lt;/strong&gt; Teori Kesetimbangan mengasumsikan Bumi ideal: berbentuk bulat sempurna, seluruh permukaannya ditutupi oleh air dengan distribusi massa yang seragam, dan mengabaikan pengaruh kelembaman (Inertia). Ini adalah asumsi yang disederhanakan dari kondisi Bumi nyata.&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;10&lt;/span&gt; Dalam satu siklus bulanan, Spring Tide terjadi sebanyak... &lt;span class=&quot;qa-type&quot;&gt;Pilihan Ganda&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;ul class=&quot;mc-options&quot;&gt;
        &lt;li&gt;1 kali&lt;/li&gt;
        &lt;li class=&quot;correct&quot;&gt;2 kali&lt;/li&gt;
        &lt;li&gt;3 kali&lt;/li&gt;
        &lt;li&gt;4 kali&lt;/li&gt;
        &lt;li&gt;Tidak tentu&lt;/li&gt;
      &lt;/ul&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban: B&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;&lt;strong&gt;Pembahasan:&lt;/strong&gt; Spring Tide terjadi 2 kali dalam satu siklus bulanan: pertama saat Bulan Baru (New Moon / Konjungsi) di Minggu ke-1, dan kedua saat Bulan Purnama (Full Moon / Oposisi) di Minggu ke-3. Begitu pula Neap Tide terjadi 2 kali: saat Bulan Kuarter Pertama (Minggu ke-2) dan Bulan Kuarter Ketiga (Minggu ke-4).&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- ESAI SINGKAT --&gt;
  &lt;h3 style=&quot;background:var(--green-tide);color:white;padding:10px 18px;border-radius:8px;margin:28px 0 16px;&quot;&gt;📝 B. Esai Singkat&lt;/h3&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;11&lt;/span&gt; Jelaskan perbedaan antara Teori Kesetimbangan (Equilibrium Theory) dan Teori Dinamis (Dynamical Theory) dalam menjelaskan pasang surut air laut! &lt;span class=&quot;qa-type&quot;&gt;Esai&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban:&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;
        &lt;strong&gt;Teori Kesetimbangan (Newton):&lt;/strong&gt;&lt;br&gt;
        Menyatakan bahwa naik-turunnya permukaan laut sebanding dengan gaya pembangkit pasang surut. Bumi diasumsikan berbentuk bulat sempurna, seluruh permukaannya tertutup air homogen, dan kelembaman (inertia) diabaikan. Faktor yang dipertimbangkan: rotasi Bumi, revolusi Bulan dan Bumi terhadap Matahari. Teori ini bersifat &lt;em&gt;kualitatif&lt;/em&gt;.&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;Teori Dinamis (Dynamical Theory):&lt;/strong&gt;&lt;br&gt;
        Menyatakan bahwa gaya pembangkit pasut menghasilkan gelombang pasut (tide wave) yang periodenya sebanding dengan gaya pembangkit. Lautan homogen diasumsikan tetap menutupi seluruh Bumi pada kedalaman konstan. Teori ini mempertimbangkan lebih banyak faktor nyata: kedalaman dan luas perairan, pengaruh rotasi Bumi (gaya Coriolis), dan gesekan dasar laut. Hasilnya lebih akurat dan kuantitatif.
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;12&lt;/span&gt; Apa yang dimaksud dengan Pasang Purnama (Spring Tide) dan Pasang Perbani (Neap Tide)? Jelaskan kondisi astronomis yang menyebabkan masing-masing! &lt;span class=&quot;qa-type&quot;&gt;Esai&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban:&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;
        &lt;strong&gt;Pasang Purnama (Spring Tide):&lt;/strong&gt;&lt;br&gt;
        Terjadi ketika Bumi, Bulan, dan Matahari berada dalam satu garis lurus (sejajar). Kondisi ini terjadi pada saat Bulan Baru (New Moon/Konjungsi) dan Bulan Purnama (Full Moon/Oposisi). Lunar Tide dan Solar Tide bekerja searah dan saling memperkuat, menghasilkan pasang yang sangat tinggi dan surut yang sangat rendah (tidal range besar).&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;Pasang Perbani (Neap Tide):&lt;/strong&gt;&lt;br&gt;
        Terjadi ketika Bumi, Bulan, dan Matahari membentuk sudut tegak lurus (90°). Kondisi ini terjadi pada saat Bulan Seperempat Pertama dan Bulan Tiga Perempat. Lunar Tide dan Solar Tide bekerja saling tegak lurus dan saling melemahkan, menghasilkan pasang yang rendah dan surut yang tidak terlalu dalam (tidal range kecil).
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;13&lt;/span&gt; Sebutkan dan jelaskan tiga tipe pasang surut air laut berdasarkan frekuensi hariannya beserta contoh lokasi di Indonesia! &lt;span class=&quot;qa-type&quot;&gt;Esai&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban:&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;
        &lt;strong&gt;1. Pasang Surut Harian Tunggal (Diurnal Tide):&lt;/strong&gt; Terjadi 1 kali pasang tinggi dan 1 kali pasang rendah dalam sehari (~24 jam). Pola ketinggian relatif seragam. Contoh di Indonesia: &lt;em&gt;Selat Karimata&lt;/em&gt;.&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;2. Pasang Surut Harian Ganda (Semi-Diurnal Tide):&lt;/strong&gt; Terjadi 2 kali pasang tinggi dan 2 kali pasang rendah dalam sehari dengan ketinggian yang hampir sama. Contoh: &lt;em&gt;Selat Malaka dan Laut Andaman&lt;/em&gt;.&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;3. Pasang Surut Campuran Condong Harian Tunggal (Mixed Tide Prevailing Diurnal):&lt;/strong&gt; Terjadi 2 kali pasang tinggi dan 2 kali pasang rendah per hari, namun ketinggian puncak-puncaknya tidak sama (satu lebih tinggi dari yang lain). Tipe ini dominan diurnal. Banyak ditemukan di berbagai wilayah Indonesia.
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;14&lt;/span&gt; Jelaskan apa yang dimaksud dengan &quot;Konjungsi&quot; dan &quot;Oposisi&quot; dalam konteks pasang surut air laut! &lt;span class=&quot;qa-type&quot;&gt;Esai&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban:&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;
        &lt;strong&gt;Konjungsi:&lt;/strong&gt; Adalah posisi di mana Bulan berada di antara Bumi dan Matahari dalam satu garis lurus. Pada posisi ini, sisi Bulan yang menghadap Bumi tidak menerima cahaya Matahari dan tampak gelap — ini adalah fase Bulan Baru (New Moon). Kondisi konjungsi menyebabkan Spring Tide (pasang purnama) dengan pasang sangat tinggi.&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;Oposisi:&lt;/strong&gt; Adalah posisi di mana Bulan berada di sisi berlawanan dari Bumi dibandingkan Matahari, dalam satu garis lurus. Pada posisi ini, seluruh sisi Bulan yang menghadap Bumi diterangi oleh Matahari dan tampak purnama — ini adalah fase Bulan Purnama (Full Moon). Kondisi oposisi juga menyebabkan Spring Tide. Dalam satu siklus bulanan, terjadi 2 kali pasang tinggi tertinggi yaitu saat konjungsi dan oposisi.
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;15&lt;/span&gt; Bagaimana fenomena pasang surut air laut memberikan dampak positif bagi pariwisata bahari, khususnya di Bali? Berikan contoh konkret! &lt;span class=&quot;qa-type&quot;&gt;Esai&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban:&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;
        Pasang surut memberikan dampak positif bagi pariwisata bahari melalui beberapa cara:&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;Dampak Positif:&lt;/strong&gt; (1) Terciptanya kolam pasang surut (tidal pools) yang menjadi ekosistem unik dan daya tarik wisata; (2) Memberikan peluang snorkeling saat air surut dan terumbu karang terekspos; (3) Variasi tampilan lanskap pantai antara kondisi pasang dan surut menciptakan pemandangan yang lebih menarik.&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;Pemanfaatan:&lt;/strong&gt; (1) Wisata selancar (surfing) saat pasang ketika ombak lebih besar; (2) Wisata jelajah pantai dan akses ke lokasi terpencil saat surut; (3) Aktivitas memancing yang lebih produktif saat perubahan pasang surut.&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;Contoh Konkret — Tanah Lot, Bali:&lt;/strong&gt; Saat air surut, jalan menuju pura Tanah Lot dapat dilewati wisatawan yang ingin mengunjungi pura secara langsung. Saat air pasang, jalan tersebut tertutup air laut dan pura tampak berdiri sendiri di atas batu karang di tengah lautan, menciptakan pemandangan ikonik yang menjadi daya tarik utama wisatawan.
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- KONSEP --&gt;
  &lt;h3 style=&quot;background:var(--sun);color:white;padding:10px 18px;border-radius:8px;margin:28px 0 16px;&quot;&gt;📝 C. Soal Konsep &amp; Analisis&lt;/h3&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;16&lt;/span&gt; Mengapa pada saat Bulan Purnama terjadi pasang yang sangat tinggi, padahal jarak Bulan tidak lebih dekat ke Bumi dibanding hari-hari lain? &lt;span class=&quot;qa-type&quot;&gt;Konsep&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban:&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;
        Hal ini terjadi bukan karena jarak Bulan yang lebih dekat, melainkan karena posisi Bumi-Bulan-Matahari yang &lt;strong&gt;sejajar dalam satu garis lurus (oposisi)&lt;/strong&gt;. Pada kondisi ini, gaya tarik Bulan terhadap Bumi dan gaya tarik Matahari terhadap Bumi bekerja dalam arah yang sejajar dan saling memperkuat (superposisi gaya). Akibatnya, gaya pembangkit pasut total menjadi jauh lebih besar dari pada hari-hari biasa, sehingga menghasilkan pasang yang sangat tinggi (Spring Tide). Fenomena yang sama terjadi saat Bulan Baru (konjungsi), meski tampilan Bulan berbeda, efek pasangnya sama besar karena geometri Bumi-Bulan-Matahari yang sama.
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;17&lt;/span&gt; Apa kelemahan Teori Kesetimbangan Newton dibandingkan Teori Dinamis dalam menjelaskan pasang surut? &lt;span class=&quot;qa-type&quot;&gt;Konsep&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban:&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;
        &lt;strong&gt;Kelemahan Teori Kesetimbangan:&lt;/strong&gt;&lt;br&gt;
        (1) Hanya bersifat &lt;em&gt;kualitatif&lt;/em&gt; — tidak dapat menghitung secara akurat besaran pasang surut;&lt;br&gt;
        (2) Menggunakan asumsi ideal yang tidak realistis: Bumi berbentuk bulat sempurna, seluruh permukaannya tertutup air seragam, dan kelembaman (inertia) diabaikan;&lt;br&gt;
        (3) Tidak memperhitungkan faktor fisik nyata seperti kedalaman perairan, bentuk basin laut, dan pengaruh Gaya Coriolis akibat rotasi Bumi;&lt;br&gt;
        (4) Tidak memperhitungkan gesekan dasar laut yang berpengaruh pada propagasi gelombang pasut.&lt;br&gt;&lt;br&gt;
        Teori Dinamis lebih unggul karena mempertimbangkan faktor-faktor nyata tersebut dan menghasilkan prediksi pasang surut yang lebih akurat dan kuantitatif.
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;18&lt;/span&gt; Gambarkan (secara deskriptif) diagram posisi Bumi, Bulan, dan Matahari yang menghasilkan Pasang Purnama dan Pasang Perbani! &lt;span class=&quot;qa-type&quot;&gt;Konsep&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban:&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;
        &lt;strong&gt;Pasang Purnama (Spring Tide):&lt;/strong&gt;&lt;br&gt;
        [Matahari] ←—— [Bulan Baru] ←—— [Bumi] ←—— [Bulan Purnama]&lt;br&gt;
        Ketiga benda langit sejajar dalam satu garis lurus. Bulan Baru (New Moon) berada di antara Bumi dan Matahari (konjungsi), atau Bulan Purnama (Full Moon) berada di sisi berlawanan dari Matahari terhadap Bumi (oposisi). Gaya tarik Bulan dan Matahari searah → saling menguatkan → Spring Tide.&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;Pasang Perbani (Neap Tide):&lt;/strong&gt;&lt;br&gt;
        &amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;[Bulan Kuarter]&lt;br&gt;
        &amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;↑&lt;br&gt;
        [Matahari] ←—— [Bumi]&lt;br&gt;
        &amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;↓&lt;br&gt;
        &amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;[Bulan Kuarter]&lt;br&gt;
        Bulan berada tegak lurus (90°) terhadap garis Bumi-Matahari. Gaya tarik Bulan dan Matahari saling tegak lurus → sebagian saling meniadakan → Neap Tide (pasang kecil).
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;19&lt;/span&gt; Seorang wisatawan ingin berkunjung ke Tanah Lot pada saat yang tepat untuk berjalan kaki menuju pura. Pada kondisi pasang surut yang bagaimana ia sebaiknya datang, dan mengapa? &lt;span class=&quot;qa-type&quot;&gt;Aplikasi&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban:&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;
        Wisatawan sebaiknya datang pada saat &lt;strong&gt;air surut (low tide)&lt;/strong&gt;, khususnya saat &lt;strong&gt;Pasang Perbani (Neap Tide)&lt;/strong&gt; yang menghasilkan surut yang lebih dalam, atau minimal saat air sedang surut dalam siklus harian.&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;Alasan:&lt;/strong&gt; Tanah Lot adalah pura yang berdiri di atas batu karang di tepi pantai. Jalan penghubung antara daratan dan pura berada di bawah permukaan air saat pasang. Saat air surut, jalan tersebut terekspos dan dapat dilewati wisatawan. Sebaliknya, saat air pasang (khususnya Spring Tide / Pasang Purnama), jalan tersebut tertutup sepenuhnya oleh air laut dan pura menjadi tidak dapat dijangkau dengan berjalan kaki. Kondisi surut, terutama saat Neap Tide, memberikan waktu terlama untuk mengeksplorasi pura.
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;20&lt;/span&gt; Mengapa Gaya Coriolis menjadi salah satu faktor dalam Teori Dinamis pasang surut, tetapi tidak disebutkan dalam Teori Kesetimbangan? &lt;span class=&quot;qa-type&quot;&gt;Analisis&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban:&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;
        &lt;strong&gt;Teori Kesetimbangan&lt;/strong&gt; mengasumsikan Bumi ideal yang seluruh permukaannya tertutup air homogen dengan massa seragam. Dalam kerangka teori ini, pendekatan yang digunakan bersifat statis dan kualitatif — hanya melihat keseimbangan gaya gravitasi. Kelembaman (inertia) sengaja diabaikan, sehingga efek dinamik seperti Gaya Coriolis tidak dimasukkan.&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;Teori Dinamis&lt;/strong&gt; memperlakukan pasang surut sebagai &lt;em&gt;gelombang&lt;/em&gt; yang merambat di lautan. Saat gelombang pasut bergerak melintasi lautan, Gaya Coriolis — yang muncul akibat rotasi Bumi — membelokkan arah pergerakan air (ke kanan di belahan bumi utara, ke kiri di belahan bumi selatan). Ini menciptakan pola rotasi gelombang pasut yang disebut &lt;em&gt;amphidromic system&lt;/em&gt;. Tanpa mempertimbangkan Gaya Coriolis, prediksi pasang surut di lokasi tertentu akan tidak akurat.
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;21&lt;/span&gt; Apakah perbedaan grafik Diurnal, Semi-Diurnal, dan Mixed Semi-Diurnal dalam plot ketinggian air vs waktu? &lt;span class=&quot;qa-type&quot;&gt;Konsep&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban:&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;
        &lt;strong&gt;Diurnal:&lt;/strong&gt; Grafik menunjukkan 1 puncak (high tide) dan 1 lembah (low tide) dalam periode 24 jam. Bentuknya menyerupai satu gelombang sinus penuh per hari.&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;Semi-Diurnal:&lt;/strong&gt; Grafik menunjukkan 2 puncak dan 2 lembah dalam 24 jam dengan ketinggian masing-masing puncak yang hampir sama satu sama lain. Frekuensi dua kali lebih tinggi dari diurnal.&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;Mixed Semi-Diurnal (Mixed Prevailing Diurnal):&lt;/strong&gt; Grafik menunjukkan 2 puncak dan 2 lembah dalam 24 jam, namun ketinggian kedua puncak tersebut &lt;em&gt;tidak sama&lt;/em&gt; (satu puncak jauh lebih tinggi dari yang lain), begitu pula kedua lembahnya berbeda kedalaman. Pola ini lebih kompleks dan merupakan campuran antara diurnal dan semi-diurnal.
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;22&lt;/span&gt; Sebutkan faktor-faktor penyebab pasang surut menurut Teori Kesetimbangan! Mengapa rotasi Bumi termasuk salah satunya? &lt;span class=&quot;qa-type&quot;&gt;Konsep&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban:&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;
        &lt;strong&gt;Faktor penyebab menurut Teori Kesetimbangan:&lt;/strong&gt;&lt;br&gt;
        (1) Rotasi Bumi pada sumbunya&lt;br&gt;
        (2) Revolusi Bulan terhadap Matahari&lt;br&gt;
        (3) Revolusi Bumi terhadap Matahari&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;Mengapa Rotasi Bumi termasuk:&lt;/strong&gt; Rotasi Bumi pada sumbunya menyebabkan suatu titik di permukaan Bumi secara bergantian menghadap ke arah Bulan dan Matahari, lalu menjauh. Ketika suatu titik menghadap tepat ke arah Bulan, gaya tarik Bulan lebih kuat → terjadi pasang tinggi. Ketika titik tersebut tegak lurus terhadap arah Bulan → terjadi pasang rendah. Rotasi Bumi inilah yang menghasilkan ritme harian (diurnal/semi-diurnal) dari pasang surut.
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;23&lt;/span&gt; Apakah yang dimaksud dengan &quot;gaya pembangkit pasang surut&quot; dan bagaimana ia bekerja berdasarkan Teori Kesetimbangan? &lt;span class=&quot;qa-type&quot;&gt;Konsep&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban:&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;
        &lt;strong&gt;Gaya Pembangkit Pasang Surut&lt;/strong&gt; adalah gaya resultante dari kombinasi gaya gravitasi benda astronomi (terutama Bulan dan Matahari) terhadap massa air di Bumi.&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;Cara kerjanya menurut Teori Kesetimbangan:&lt;/strong&gt;&lt;br&gt;
        Gaya pembangkit pasut dibagi ke dalam dua sistem: (1) Sistem Bumi-Bulan, dan (2) Sistem Bumi-Matahari. Naik-turunnya permukaan laut sebanding dengan besarnya gaya pembangkit yang bekerja. Gaya ini akan menimbulkan tonjolan air (bulge) di dua lokasi yang menghadap dan berlawanan arah dengan Bulan/Matahari (air tinggi di 2 lokasi), serta air yang lebih rendah di dua lokasi yang tegak lurus terhadap arah tonjolan tersebut (air rendah di 2 lokasi). Kombinasi kedua sistem inilah yang menghasilkan pola pasang surut harian.
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;24&lt;/span&gt; Berikan 3 contoh pemanfaatan fenomena pasang surut dalam sektor non-pariwisata! (Soal pengayaan/open-ended) &lt;span class=&quot;qa-type&quot;&gt;Pengayaan&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban (Pengayaan):&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;
        &lt;strong&gt;1. Navigasi Pelayaran:&lt;/strong&gt; Data pasang surut sangat penting bagi kapal untuk masuk-keluar pelabuhan dengan kedalaman yang aman. Kapal besar hanya bisa berlabuh saat pasang tinggi.&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;2. Budidaya Perikanan (Tambak):&lt;/strong&gt; Sistem tambak tradisional memanfaatkan pasang surut untuk pertukaran air alami, memasukkan air segar dan nutrien saat pasang, mengeluarkan air saat surut.&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;3. Pembangkit Listrik Tenaga Pasang Surut (Tidal Power):&lt;/strong&gt; Energi kinetik dan potensial dari pergerakan air pasang surut dapat dimanfaatkan untuk menghasilkan listrik menggunakan turbin yang dipasang di selat-selat dengan range pasang surut besar.&lt;br&gt;&lt;br&gt;
        &lt;em&gt;Bonus:&lt;/em&gt; Pertanian garam rakyat juga memanfaatkan pasang surut untuk mengisi petak-petak garam dengan air laut.
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa-item&quot;&gt;
    &lt;div class=&quot;qa-question&quot;&gt;
      &lt;span&gt;&lt;span class=&quot;qa-num&quot;&gt;25&lt;/span&gt; SOAL INTEGRASI: Jelaskan bagaimana siklus Bulan Baru → Bulan Kuarter Pertama → Bulan Purnama → Bulan Kuarter Ketiga berhubungan dengan perubahan jenis pasang surut (Spring vs Neap) dan gambarkan polanya! &lt;span class=&quot;qa-type&quot;&gt;Integrasi&lt;/span&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;qa-answer&quot;&gt;
      &lt;div class=&quot;ans-label&quot;&gt;✅ Jawaban Lengkap:&lt;/div&gt;
      &lt;div class=&quot;discussion&quot;&gt;
        &lt;strong&gt;Hubungan siklus Bulan dengan pasang surut:&lt;/strong&gt;&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;Minggu 1 — Bulan Baru (New Moon/Konjungsi):&lt;/strong&gt;&lt;br&gt;
        Bulan berada di antara Bumi dan Matahari → posisi segaris. Lunar Tide dan Solar Tide bekerja searah dan saling memperkuat → SPRING TIDE (pasang sangat tinggi, surut sangat rendah).&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;Minggu 2 — Bulan Kuarter Pertama (First Quarter):&lt;/strong&gt;&lt;br&gt;
        Bulan telah bergerak 90° dari posisi Bulan Baru → membentuk sudut tegak lurus dengan Bumi-Matahari. Lunar Tide dan Solar Tide saling berlawanan arah → NEAP TIDE (pasang rendah, range kecil).&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;Minggu 3 — Bulan Purnama (Full Moon/Oposisi):&lt;/strong&gt;&lt;br&gt;
        Bulan berada di sisi berlawanan dari Matahari terhadap Bumi → kembali posisi segaris. Kembali menghasilkan SPRING TIDE kedua dalam satu bulan.&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;Minggu 4 — Bulan Kuarter Ketiga (Third Quarter):&lt;/strong&gt;&lt;br&gt;
        Bulan kembali membentuk sudut 90° (di sisi lain). Lunar Tide dan Solar Tide kembali saling melemahkan → NEAP TIDE kedua dalam satu bulan.&lt;br&gt;&lt;br&gt;
        &lt;strong&gt;Pola:&lt;/strong&gt; Spring → Neap → Spring → Neap (berulang setiap ~29,5 hari siklus sinodik Bulan).
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/section&gt;

  .hero h1 {
    font-family: &#x27;Segoe UI&#x27;, system-ui, sans-serif;

  .hero h1 span { color: #a8d8f0; }
  .hero-sub {
    margin-top: 6px;

    font-size: 1.05rem;
    position: relative;
  }
  .hero-tags {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 20px;
    position: relative;
  }
  .tag {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.35);

  /* LAYOUT */
  main { max-width: 1100px; margin: 0 auto; padding: 40px 20px 80px; }
  section { margin-bottom: 64px; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--ocean-light);
    margin-bottom: 8px;
  }
  h2 {
    font-size: 1.65rem;
    font-weight: 800;
    color: var(--ocean-deep);
    margin-bottom: 24px;
    padding-bottom: 0;
    border-bottom: none;
  }
  h3 { font-size: 1.2rem; font-weight: 700; color: var(--ocean-mid); margin: 24px 0 12px; }
  h4 { font-size: 1rem; font-weight: 700; color: var(--text-mid); margin: 16px 0 8px; }
  p { color: var(--text-mid); margin-bottom: 12px; }

  /* CARDS */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px;
    margin-bottom: 20px;
    border-left: 5px solid var(--ocean-light);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(10,61,98,0.13); }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
  .card.accent-cyan  { border-left-color: var(--ocean-light); }
  .card.accent-amber { border-left-color: var(--thermocline); }
  .card.accent-green { border-left-color: var(--nutrient); }
  .card.accent-blue  { border-left-color: var(--ocean-mid); }
  .card .card-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--ocean-deep);
    margin-bottom: 12px;
    letter-spacing: 0;
    text-transform: none;
  }
  .card h3 { margin: 0 0 10px; font-size: 1rem; }

  /* DEFINITION BOX */
  .def-box {
    background: linear-gradient(135deg, var(--ocean-deep), var(--ocean-mid));
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 28px 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .def-box::before {
    content: &#x27;🌊&#x27;;
    position: absolute;
    right: 20px; top: 16px;
    font-size: 3rem;
    opacity: 0.2;
    line-height: 1;
  }
  .def-box p {
    font-size: 1.05rem;
    color: rgba(255,255,255,0.95);
    font-style: italic;
    line-height: 1.75;
  }
  .def-box strong { color: #ffd966; }
  .def-box .source {
    margin-top: 12px;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    font-style: normal;
  }

  /* TABLE */
  .table-wrap { overflow-x: auto; margin: 16px 0; border-radius: var(--radius-sm); box-shadow: var(--shadow); }
  table { width: 100%; border-collapse: collapse; background: white; font-size: 0.93rem; }
  thead tr { background: var(--ocean-deep); }
  th {
    padding: 14px 16px;
    text-align: left;
    font-weight: 700;
    color: white;
    font-size: 0.88rem;
    white-space: nowrap;
  }
  td {
    padding: 12px 16px;
    border-bottom: 1px solid #e8f4fd;
    color: var(--text-mid);
    vertical-align: top;
  }
  tr:nth-child(even) td { background: var(--ocean-pale); }
  tr:hover td { background: #bee3f8; }

  /* LAYER DIAGRAM */
  .layer-diagram { border-radius: var(--radius); overflow: hidden; width: 100%; max-width: 420px; box-shadow: var(--shadow); }
  .layer { padding: 20px 24px; display: flex; align-items: center; gap: 16px; }
  .layer-mix   { background: #cce8f8; border-left: 5px solid #3498db; }
  .layer-thermo { background: #fdebd0; border-left: 5px solid #e67e22; }
  .layer-deep  { background: #e8d5f5; border-left: 5px solid #8e44ad; }
  .layer-name  { font-weight: 700; color: var(--ocean-deep); font-size: 0.95rem; }
  .layer-desc  { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .layer-depth { font-size: 11px; font-weight: 600; color: var(--thermocline); }

  /* PROCESS STEPS */
  .steps { display: flex; flex-direction: column; gap: 16px; }
  .step { display: flex; gap: 20px; align-items: flex-start; }
  .step-num {
    flex-shrink: 0;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--ocean-light), var(--ocean-mid));
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: #fff;
    box-shadow: 0 2px 8px rgba(52,152,219,0.35);
  }
  .step-content { flex: 1; }
  .step-content strong { color: var(--ocean-deep); display: block; margin-bottom: 4px; }
  .step-content p { margin: 0; font-size: 14px; }

  /* CHEAT SHEET */
  #cheatsheet {
    background: var(--cheat-bg);
    border-radius: var(--radius);
    padding: 32px;
    border: 1.5px solid rgba(39,174,96,0.3);
    box-shadow: var(--shadow);

  #cheatsheet h2 { color: var(--nutrient); }
  .cheat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .cheat-block {
    background: var(--card-bg);
    border: 1.5px solid rgba(39,174,96,0.2);
    border-radius: 8px;
    padding: 16px;
    box-shadow: 0 2px 8px rgba(10,61,98,0.06);

  .cheat-block h4 { color: var(--nutrient); font-size: 0.88rem; margin: 0 0 10px; }
  .cheat-block ul { list-style: none; padding: 0; }
  .cheat-block li {
    color: var(--text-mid);
    font-size: 13px;
    padding: 5px 0 5px 18px;
    position: relative;
    border-bottom: 1px dashed #d5f5e3;
  }
  .cheat-block li:last-child { border-bottom: none; }
  .cheat-block li::before { content: &#x27;\25B8&#x27;; position: absolute; left: 0; color: var(--nutrient); font-size: 11px; top: 8px; }

  /* SOAL */
  .soal-item {
    background: var(--card-bg);
    border: 1px solid #d6eaf8;
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s;
  }
  .soal-item:hover { box-shadow: 0 6px 20px rgba(10,61,98,0.13); }
  .soal-q {
    padding: 20px 24px;
    display: flex;
    gap: 16px;
    cursor: pointer;
    align-items: flex-start;
    transition: background 0.2s;
    background: var(--card-bg);
  }
  .soal-q:hover { background: var(--ocean-pale); }
  .soal-num {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 700;
    background: var(--ocean-pale);
    color: var(--ocean-deep);
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    border: 1px solid var(--ocean-light);

  .soal-q p { margin: 0; color: var(--text-dark); font-size: 14px; line-height: 1.6; }
  .soal-a {
    display: none;
    padding: 16px 24px 20px 60px;
    border-top: 1px solid #d6eaf8;
    background: #f8fbff;
  }
  .soal-a.open { display: block; }
  .jawaban-label {
    font-size: 11px; font-weight: 700; color: var(--nutrient);
    letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px;
  }
  .soal-a p { font-size: 14px; color: var(--text-mid); }
  .toggle-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  /* CONCEPT MAP */
  .concept-map {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 32px;
    overflow-x: auto;
    text-align: center;

  .cm-center { text-align: center; margin-bottom: 24px; }
  .cm-box { display: inline-block; padding: 12px 28px; border-radius: 8px; font-weight: 700; font-size: 1rem; }
  .cm-main {
    background: linear-gradient(135deg, var(--ocean-deep), var(--ocean-mid));
    color: white; font-size: 1.1rem;
    box-shadow: 0 4px 12px rgba(10,61,98,0.3);
  }
  .cm-sub { background: var(--ocean-pale); color: var(--ocean-deep); border: 2px solid var(--ocean-light); font-size: 0.9rem; }
  .cm-leaf {
    background: #f0f8ff; border: 1px solid #b8d9f0;
    color: var(--text-mid); font-size: 0.8rem; padding: 8px 16px; font-weight: 500;
  }
  .cm-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
  .cm-connector { text-align: center; color: var(--ocean-light); font-size: 20px; margin-bottom: 8px; }
  .cm-group { display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 160px; }
  .cm-arrow { color: var(--ocean-light); font-size: 18px; }

  /* HIGHLIGHT */
  .highlight {
    background: var(--ocean-pale);
    border-left: 3px solid var(--ocean-light);
    padding: 12px 16px;
    border-radius: 0 8px 8px 0;
    margin: 16px 0;
  }
  .highlight p { margin: 0; font-size: 14px; color: var(--text-mid); }

  /* BADGE */
  .badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-right: 6px; }
  .badge-cyan  { background: var(--ocean-pale); color: var(--ocean-deep); border: 1px solid var(--ocean-light); }
  .badge-amber { background: #fef3e2; color: #c07a00; border: 1px solid #f0b86e; }
  .badge-green { background: #d5f5e3; color: #1a6640; border: 1px solid #a9dfbf; }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 32px;
    color: var(--text-muted);
    font-size: 13px;
    border-top: 1px solid #d6eaf8;
    background: white;
  }

  /* UTILITIES */
  ul.list { list-style: none; padding: 0; }
  ul.list li {
    padding: 6px 0 6px 20px;
    position: relative;
    color: var(--text-mid);
    font-size: 14px;
    border-bottom: 1px solid #e8f4fd;
  }
  ul.list li:last-child { border-bottom: none; }
  ul.list li::before { content: &#x27;\25B8&#x27;; position: absolute; left: 0; color: var(--ocean-light); font-size: 10px; top: 10px; }
  strong { color: var(--ocean-deep); }
  .flex-cols { display: flex; gap: 24px; flex-wrap: wrap; }
  .flex-cols &gt; * { flex: 1; min-width: 240px; }
  .mb16 { margin-bottom: 16px; }

  @media (max-width: 640px) {
    main { padding: 32px 16px 60px; }
    .hero { padding: 40px 16px 52px; }
    .soal-a { padding-left: 24px; }
  }

&lt;header class=&quot;hero&quot; id=&quot;hero&quot;&gt;
  &lt;h1&gt;Fenomena &lt;span&gt;Upwelling&lt;/span&gt;&lt;/h1&gt;
  &lt;p class=&quot;hero-sub&quot;&gt;Materi Ujian Oseanografi · Kompilasi Lengkap dari Slide Kuliah&lt;/p&gt;
  &lt;div class=&quot;hero-tags&quot;&gt;
