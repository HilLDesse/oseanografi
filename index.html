  /* ── SEARCH HIGHLIGHT ── */
  mark { background: #fef08a; border-radius: 2px; padding: 1px 0; }

  /* ── FOOTER ── */
  footer {

    height: 3px;

    z-index: 1000;
    transition: width .1s;

  @media(max-width: 480px) {
    .hero { padding: 40px 16px 36px; }
    .layout { margin: 28px auto; }
    .section-body.open { padding: 16px; }
  }

      &lt;a href=&quot;#sec8&quot; class=&quot;toc-item&quot;&gt;&lt;span class=&quot;toc-icon&quot;&gt;📖&lt;/span&gt; Glosarium&lt;/a&gt;
      &lt;a href=&quot;#sec9&quot; class=&quot;toc-item&quot;&gt;&lt;span class=&quot;toc-icon&quot;&gt;❓&lt;/span&gt; Soal Ujian&lt;/a&gt;
      &lt;a href=&quot;#sec10&quot; class=&quot;toc-item&quot;&gt;&lt;span class=&quot;toc-icon&quot;&gt;⭐&lt;/span&gt; Fakta Penting&lt;/a&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- SEC 1: KONSEP DASAR --&gt;
  &lt;div class=&quot;section-card&quot; id=&quot;sec1&quot;&gt;
    &lt;div class=&quot;section-header open&quot; onclick=&quot;toggleSection(this)&quot;&gt;
      &lt;div class=&quot;section-title&quot;&gt;
        &lt;span&gt;🌊&lt;/span&gt;
        &lt;span&gt;Konsep Dasar Fisika Oseanografi Pantai&lt;/span&gt;
        &lt;span class=&quot;section-badge&quot;&gt;BAB 1&lt;/span&gt;
      &lt;/div&gt;
      &lt;span class=&quot;toggle-icon rotated&quot;&gt;⌄&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;section-body open&quot;&gt;
      &lt;div class=&quot;lead&quot;&gt;Fisika oseanografi mempelajari bagaimana kekuatan laut (gelombang, pasang surut, arus) secara fisik mempengaruhi daratan pantai dan ekosistem pesisir — termasuk dampaknya terhadap pariwisata.&lt;/div&gt;

      &lt;h3&gt;⚡ Tiga Kekuatan Utama Pengubah Pantai&lt;/h3&gt;
      &lt;div class=&quot;two-col&quot;&gt;
        &lt;div class=&quot;concept-card info&quot;&gt;
          &lt;h4&gt;🌊 Gelombang (Waves)&lt;/h4&gt;
          &lt;p&gt;Energi yang dibawa angin dari tengah laut. Saat mencapai pantai, gelombang membentur dan mengikis material pantai. Ini adalah penyebab utama &lt;strong&gt;abrasi&lt;/strong&gt;.&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;concept-card info&quot;&gt;
          &lt;h4&gt;🌙 Pasang Surut (Tides)&lt;/h4&gt;
          &lt;p&gt;Naik turunnya permukaan laut akibat gravitasi bulan dan matahari. Bersama gelombang, pasang surut mengubah posisi garis pantai secara periodik.&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;concept-card info&quot;&gt;
        &lt;h4&gt;💨 Arus Pantai (Coastal Currents)&lt;/h4&gt;
        &lt;p&gt;Aliran air di sepanjang garis pantai yang mampu mengangkut dan mengendapkan sedimen (pasir, lumpur) dari satu tempat ke tempat lain. Arus ini adalah kunci proses &lt;strong&gt;akresi&lt;/strong&gt;.&lt;/p&gt;
      &lt;/div&gt;

      &lt;div class=&quot;callout callout-key&quot;&gt;
        &lt;span class=&quot;callout-icon&quot;&gt;💡&lt;/span&gt;
        &lt;div class=&quot;callout-text&quot;&gt;
          &lt;strong&gt;Hubungan dengan Pariwisata&lt;/strong&gt;
          Kerusakan pantai akibat abrasi langsung berdampak pada kualitas destinasi wisata. Sebaliknya, struktur perlindungan pantai (seperti breakwater, jetty) dapat menjadi daya tarik wisata tersendiri.
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- SEC 2: PANTAI &amp; PESISIR --&gt;
  &lt;div class=&quot;section-card&quot; id=&quot;sec2&quot;&gt;
    &lt;div class=&quot;section-header open&quot; onclick=&quot;toggleSection(this)&quot;&gt;
      &lt;div class=&quot;section-title&quot;&gt;
        &lt;span&gt;🏖️&lt;/span&gt;
        &lt;span&gt;Pengertian Pantai &amp; Pesisir&lt;/span&gt;
        &lt;span class=&quot;section-badge&quot;&gt;BAB 2&lt;/span&gt;
      &lt;/div&gt;
      &lt;span class=&quot;toggle-icon rotated&quot;&gt;⌄&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;section-body open&quot;&gt;
      &lt;div class=&quot;callout callout-exam&quot;&gt;
        &lt;span class=&quot;callout-icon&quot;&gt;⚠️&lt;/span&gt;
        &lt;div class=&quot;callout-text&quot;&gt;&lt;strong&gt;Sering Ditanyakan di Ujian!&lt;/strong&gt; Perbedaan antara pesisir (coast) dan pantai (shore) adalah konsep yang sering muncul.&lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;two-col&quot;&gt;
        &lt;div class=&quot;concept-card akresi&quot;&gt;
          &lt;h4&gt;🗺️ Pesisir (Coast)&lt;/h4&gt;
          &lt;p&gt;&lt;strong&gt;Definisi:&lt;/strong&gt; Area pertemuan antara daratan dan perairan laut di mana keduanya &lt;em&gt;saling mempengaruhi&lt;/em&gt;.&lt;/p&gt;
          &lt;ul class=&quot;hlist&quot;&gt;
            &lt;li data-icon=&quot;⬅️&quot;&gt;Darat dipengaruhi: pasang surut, angin laut, intrusi air laut&lt;/li&gt;
            &lt;li data-icon=&quot;➡️&quot;&gt;Laut dipengaruhi: aliran air tawar dari darat, angin darat&lt;/li&gt;
          &lt;/ul&gt;
          &lt;p style=&quot;margin-top:10px&quot;&gt;&lt;span class=&quot;tag tag-green&quot;&gt;Lebih Luas&lt;/span&gt; mencakup zona darat dan laut&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;concept-card abrasi&quot;&gt;
          &lt;h4&gt;🏝️ Pantai (Shore)&lt;/h4&gt;
          &lt;p&gt;&lt;strong&gt;Definisi:&lt;/strong&gt; Daerah perbatasan antara daratan dan laut, di mana terdapat &lt;em&gt;garis pantai&lt;/em&gt;.&lt;/p&gt;
          &lt;ul class=&quot;hlist&quot;&gt;
            &lt;li data-icon=&quot;📍&quot;&gt;Lebih spesifik dari pesisir&lt;/li&gt;
            &lt;li data-icon=&quot;📍&quot;&gt;Batas fisik yang terlihat langsung&lt;/li&gt;
          &lt;/ul&gt;
          &lt;p style=&quot;margin-top:10px&quot;&gt;&lt;span class=&quot;tag tag-red&quot;&gt;Lebih Sempit&lt;/span&gt; batas fisik daratan-laut&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;h3&gt;📏 Garis Pantai &amp; Sempadan Pantai&lt;/h3&gt;
      &lt;div class=&quot;concept-card warn&quot;&gt;
        &lt;h4&gt;〰️ Garis Pantai&lt;/h4&gt;
        &lt;p&gt;Garis batas pertemuan daratan dan air laut. Posisinya &lt;strong&gt;tidak tetap&lt;/strong&gt; — bergeser sesuai pasang surut dan erosi pantai yang terjadi. Garis pantai dapat berubah akibat abrasi (mundur) maupun akresi (maju ke laut).&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;concept-card info&quot;&gt;
        &lt;h4&gt;🛡️ Sempadan Pantai&lt;/h4&gt;
        &lt;p&gt;Kawasan tertentu sepanjang pantai yang memiliki manfaat penting untuk mempertahankan kelestarian fungsi pantai.&lt;/p&gt;
        &lt;p&gt;&lt;strong&gt;Kriteria:&lt;/strong&gt; Daratan sepanjang tepian pantai, lebarnya sesuai bentuk dan kondisi fisik pantai, &lt;strong&gt;minimal 100 meter&lt;/strong&gt; dari titik pasang tertinggi ke arah daratan.&lt;/p&gt;
        &lt;p&gt;&lt;span class=&quot;tag tag-blue&quot;&gt;Dasar Hukum&lt;/span&gt; PerPres No. 51 Tahun 2016 tentang Batas Sempadan Pantai&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- SEC 3: ABRASI VS AKRESI --&gt;
  &lt;div class=&quot;section-card&quot; id=&quot;sec3&quot;&gt;
    &lt;div class=&quot;section-header open&quot; onclick=&quot;toggleSection(this)&quot;&gt;
      &lt;div class=&quot;section-title&quot;&gt;
        &lt;span&gt;🔄&lt;/span&gt;
        &lt;span&gt;Abrasi vs Akresi: Dua Sisi Pantai&lt;/span&gt;
        &lt;span class=&quot;section-badge&quot;&gt;BAB 3&lt;/span&gt;
      &lt;/div&gt;
      &lt;span class=&quot;toggle-icon rotated&quot;&gt;⌄&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;section-body open&quot;&gt;
      &lt;div class=&quot;lead&quot;&gt;Abrasi dan akresi adalah dua proses oseanografi yang berlawanan arah namun sama-sama membentuk morfologi garis pantai.&lt;/div&gt;

      &lt;div class=&quot;two-col&quot;&gt;
        &lt;div class=&quot;concept-card abrasi&quot;&gt;
          &lt;h4&gt;💥 ABRASI&lt;/h4&gt;
          &lt;span class=&quot;tag tag-red&quot;&gt;Pengurangan Daratan&lt;/span&gt;
          &lt;p style=&quot;margin-top:10px&quot;&gt;&lt;strong&gt;Definisi:&lt;/strong&gt; Berkurangnya daratan atau terkikisnya bagian pantai oleh gelombang yang menerpa pantai.&lt;/p&gt;
          &lt;p&gt;&lt;strong&gt;Proses:&lt;/strong&gt;&lt;/p&gt;
          &lt;ul class=&quot;hlist&quot;&gt;
            &lt;li data-icon=&quot;1️⃣&quot;&gt;Gelombang &amp; arus mengikis tepi pantai&lt;/li&gt;
            &lt;li data-icon=&quot;2️⃣&quot;&gt;Material pantai (pasir, tanah) terbawa air&lt;/li&gt;
            &lt;li data-icon=&quot;3️⃣&quot;&gt;Garis pantai mundur ke arah darat&lt;/li&gt;
          &lt;/ul&gt;
          &lt;p style=&quot;margin-top:10px&quot;&gt;&lt;strong&gt;Dampak:&lt;/strong&gt; Luas daratan berkurang, infrastruktur terancam, kerusakan ekosistem.&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;concept-card akresi&quot;&gt;
          &lt;h4&gt;🌱 AKRESI&lt;/h4&gt;
          &lt;span class=&quot;tag tag-green&quot;&gt;Penambahan Daratan&lt;/span&gt;
          &lt;p style=&quot;margin-top:10px&quot;&gt;&lt;strong&gt;Definisi:&lt;/strong&gt; Bertambahnya daratan pantai akibat pengendapan sedimen yang dibawa gelombang di pantai.&lt;/p&gt;
          &lt;p&gt;&lt;strong&gt;Proses:&lt;/strong&gt;&lt;/p&gt;
          &lt;ul class=&quot;hlist&quot;&gt;
            &lt;li data-icon=&quot;1️⃣&quot;&gt;Arus membawa sedimen (pasir/lumpur)&lt;/li&gt;
            &lt;li data-icon=&quot;2️⃣&quot;&gt;Sedimen mengendap di pesisir&lt;/li&gt;
            &lt;li data-icon=&quot;3️⃣&quot;&gt;Garis pantai maju ke arah laut&lt;/li&gt;
          &lt;/ul&gt;
          &lt;p style=&quot;margin-top:10px&quot;&gt;&lt;strong&gt;Dampak:&lt;/strong&gt; Terbentuknya lahan baru, delta muara sungai meluas.&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;h3&gt;⚖️ Perbandingan Langsung&lt;/h3&gt;
      &lt;div class=&quot;tbl-wrap&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;
            &lt;tr&gt;
              &lt;th&gt;Aspek&lt;/th&gt;
              &lt;th&gt;Abrasi&lt;/th&gt;
              &lt;th&gt;Akresi&lt;/th&gt;
            &lt;/tr&gt;
          &lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;Arah perubahan garis pantai&lt;/td&gt;&lt;td&gt;Mundur (ke darat)&lt;/td&gt;&lt;td&gt;Maju (ke laut)&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Perubahan luas daratan&lt;/td&gt;&lt;td&gt;Berkurang&lt;/td&gt;&lt;td&gt;Bertambah&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Penyebab utama&lt;/td&gt;&lt;td&gt;Gelombang, arus mengikis&lt;/td&gt;&lt;td&gt;Sedimentasi oleh arus&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Material yang bergerak&lt;/td&gt;&lt;td&gt;Terangkut ke laut&lt;/td&gt;&lt;td&gt;Diendapkan di pantai&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Istilah lain&lt;/td&gt;&lt;td&gt;Erosi pantai&lt;/td&gt;&lt;td&gt;Sedimentasi pantai&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Dampak pada pemukiman&lt;/td&gt;&lt;td&gt;Berbahaya / merusak&lt;/td&gt;&lt;td&gt;Menguntungkan (lahan baru)&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;

      &lt;div class=&quot;callout callout-warn&quot;&gt;
        &lt;span class=&quot;callout-icon&quot;&gt;🔴&lt;/span&gt;
        &lt;div class=&quot;callout-text&quot;&gt;
          &lt;strong&gt;Penting!&lt;/strong&gt; Abrasi dan akresi bisa terjadi bersamaan di pantai yang berbeda, bahkan dalam satu garis pantai yang sama. Misalnya: sisi kiri jetty mengalami akresi, sisi kanan mengalami abrasi.
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- SEC 4: PELINDUNG ALAMI --&gt;
  &lt;div class=&quot;section-card&quot; id=&quot;sec4&quot;&gt;
    &lt;div class=&quot;section-header open&quot; onclick=&quot;toggleSection(this)&quot;&gt;
      &lt;div class=&quot;section-title&quot;&gt;
        &lt;span&gt;🌿&lt;/span&gt;
        &lt;span&gt;Perlindungan Pantai Alami&lt;/span&gt;
        &lt;span class=&quot;section-badge&quot;&gt;BAB 4A&lt;/span&gt;
      &lt;/div&gt;
      &lt;span class=&quot;toggle-icon rotated&quot;&gt;⌄&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;section-body open&quot;&gt;
      &lt;div class=&quot;lead&quot;&gt;Perlindungan alami adalah ekosistem dan formasi fisik yang secara alamiah membentengi pantai dari gelombang dan abrasi tanpa campur tangan manusia.&lt;/div&gt;

      &lt;!-- 1. Terumbu Karang --&gt;
      &lt;div class=&quot;concept-card info&quot; style=&quot;margin-bottom:16px&quot;&gt;
        &lt;div style=&quot;display:flex;align-items:center;gap:10px;margin-bottom:8px&quot;&gt;
          &lt;span style=&quot;font-size:28px&quot;&gt;🪸&lt;/span&gt;
          &lt;div&gt;
            &lt;h4 style=&quot;margin:0&quot;&gt;1. Terumbu Karang (Coral Reef)&lt;/h4&gt;
            &lt;span class=&quot;tag tag-green&quot;&gt;Ekologis&lt;/span&gt; &lt;span class=&quot;tag tag-teal&quot;&gt;Fisik&lt;/span&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;p&gt;&lt;strong&gt;Fungsi Ekologis:&lt;/strong&gt; Tempat tinggal, mencari makan, dan berlindung bagi berbagai organisme laut (hewan dan tumbuhan).&lt;/p&gt;
        &lt;p&gt;&lt;strong&gt;Fungsi Fisik (Pelindung Pantai):&lt;/strong&gt; Terumbu karang bertindak sebagai penghalang alami yang menyerap dan memecah energi gelombang sebelum gelombang mencapai pantai. Ini melindungi pantai dan ekosistem perairan dangkal dari abrasi.&lt;/p&gt;
        &lt;div class=&quot;callout callout-key&quot; style=&quot;margin-top:10px;padding:10px 14px&quot;&gt;
          &lt;span class=&quot;callout-icon&quot;&gt;🔑&lt;/span&gt;
          &lt;div class=&quot;callout-text&quot;&gt;Terumbu karang = pelindung pantai + pelindung ekosistem perairan dangkal dari abrasi.&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;!-- 2. Mangrove --&gt;
      &lt;div class=&quot;concept-card akresi&quot; style=&quot;margin-bottom:16px&quot;&gt;
        &lt;div style=&quot;display:flex;align-items:center;gap:10px;margin-bottom:8px&quot;&gt;
          &lt;span style=&quot;font-size:28px&quot;&gt;🌳&lt;/span&gt;
          &lt;div&gt;
            &lt;h4 style=&quot;margin:0&quot;&gt;2. Vegetasi / Mangrove (Bakau)&lt;/h4&gt;
            &lt;span class=&quot;tag tag-green&quot;&gt;Pelindung Terpenting&lt;/span&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;p&gt;&lt;strong&gt;Lokasi:&lt;/strong&gt; Tumbuh di garis pantai dan muara sungai (daerah pasang surut).&lt;/p&gt;
        &lt;ul class=&quot;hlist&quot;&gt;
          &lt;li data-icon=&quot;✅&quot;&gt;Penahan abrasi air laut — akar mangrove meredam energi gelombang&lt;/li&gt;
          &lt;li data-icon=&quot;✅&quot;&gt;Mengurangi risiko banjir — menghalangi masuknya air ke daratan&lt;/li&gt;
          &lt;li data-icon=&quot;✅&quot;&gt;Menjaga penghidupan masyarakat pesisir&lt;/li&gt;
          &lt;li data-icon=&quot;✅&quot;&gt;Habitat bagi biota laut dan burung&lt;/li&gt;
        &lt;/ul&gt;
        &lt;p style=&quot;margin-top:10px&quot;&gt;&lt;em&gt;&quot;Mangrove bukan sekadar tanaman — ia adalah penjaga rumah-rumah dan penghidupan masyarakat pesisir.&quot;&lt;/em&gt;&lt;/p&gt;
      &lt;/div&gt;

      &lt;!-- 3. Sand Dunes --&gt;
      &lt;div class=&quot;concept-card warn&quot; style=&quot;margin-bottom:16px&quot;&gt;
        &lt;div style=&quot;display:flex;align-items:center;gap:10px;margin-bottom:8px&quot;&gt;
          &lt;span style=&quot;font-size:28px&quot;&gt;🏜️&lt;/span&gt;
          &lt;div&gt;
            &lt;h4 style=&quot;margin:0&quot;&gt;3. Hamparan &amp; Gundukan Pasir (Sand Dunes)&lt;/h4&gt;
            &lt;span class=&quot;tag tag-yellow&quot;&gt;Non-Rigid Protection&lt;/span&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;p&gt;&lt;strong&gt;Komponen:&lt;/strong&gt;&lt;/p&gt;
        &lt;ul class=&quot;hlist&quot;&gt;
          &lt;li data-icon=&quot;🔸&quot;&gt;&lt;strong&gt;Hamparan pasir&lt;/strong&gt; — menghancurkan energi gelombang secara efektif&lt;/li&gt;
          &lt;li data-icon=&quot;🔸&quot;&gt;&lt;strong&gt;Bukit pasir (sand dunes)&lt;/strong&gt; — cadangan pasir, berfungsi sebagai &quot;tembok laut&quot;&lt;/li&gt;
        &lt;/ul&gt;
        &lt;p&gt;&lt;strong&gt;Mekanisme:&lt;/strong&gt; Sand dunes menyimpan pasir saat air pasang, dan berfungsi sebagai tanggul alami yang menghalangi air pasang dan gelombang merusak daerah backshore.&lt;/p&gt;
        &lt;p&gt;&lt;strong&gt;Pembentukan:&lt;/strong&gt; Terbentuk secara alami oleh kombinasi &lt;em&gt;gerakan pasir + angin + tumbuhan pantai&lt;/em&gt;.&lt;/p&gt;
        &lt;div class=&quot;callout callout-warn&quot; style=&quot;margin-top:10px;padding:10px 14px&quot;&gt;
          &lt;span class=&quot;callout-icon&quot;&gt;⚠️&lt;/span&gt;
          &lt;div class=&quot;callout-text&quot;&gt;Jika tidak terganggu aktivitas manusia, sand dunes membentuk sistem perlindungan kontinyu yang dapat diandalkan dari waktu ke waktu.&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;!-- 4. Pantai Lumpur --&gt;
      &lt;div class=&quot;concept-card info&quot;&gt;
        &lt;div style=&quot;display:flex;align-items:center;gap:10px;margin-bottom:8px&quot;&gt;
          &lt;span style=&quot;font-size:28px&quot;&gt;🟤&lt;/span&gt;
          &lt;div&gt;
            &lt;h4 style=&quot;margin:0&quot;&gt;4. Pantai Lumpur Dangkal (Mudflat)&lt;/h4&gt;
            &lt;span class=&quot;tag tag-blue&quot;&gt;Sedimentasi Alami&lt;/span&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;p&gt;&lt;strong&gt;Penyebab terbentuk:&lt;/strong&gt; Di daerah pantai yang banyak muara sungai, membawa sedimen suspensi dalam jumlah besar. Gelombang relatif tenang sehingga tidak mampu membawa sedimen ke laut dalam.&lt;/p&gt;
        &lt;p&gt;&lt;strong&gt;Karakteristik:&lt;/strong&gt;&lt;/p&gt;
        &lt;ul class=&quot;hlist&quot;&gt;
          &lt;li data-icon=&quot;📍&quot;&gt;Pantai luas, datar, dan dangkal&lt;/li&gt;
          &lt;li data-icon=&quot;📍&quot;&gt;Kemiringan dasar laut sangat kecil&lt;/li&gt;
          &lt;li data-icon=&quot;📍&quot;&gt;Terendam air saat pasang tinggi&lt;/li&gt;
          &lt;li data-icon=&quot;📍&quot;&gt;Sangat subur untuk mangrove (bakau)&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- SEC 5: PELINDUNG BUATAN --&gt;
  &lt;div class=&quot;section-card&quot; id=&quot;sec5&quot;&gt;
    &lt;div class=&quot;section-header open&quot; onclick=&quot;toggleSection(this)&quot;&gt;
      &lt;div class=&quot;section-title&quot;&gt;
        &lt;span&gt;🏗️&lt;/span&gt;
        &lt;span&gt;Perlindungan Pantai Buatan&lt;/span&gt;
        &lt;span class=&quot;section-badge&quot;&gt;BAB 4B&lt;/span&gt;
      &lt;/div&gt;
      &lt;span class=&quot;toggle-icon rotated&quot;&gt;⌄&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;section-body open&quot;&gt;
      &lt;div class=&quot;lead&quot;&gt;Perlindungan buatan adalah bangunan atau struktur yang sengaja dibuat manusia untuk melindungi pantai dari abrasi gelombang.&lt;/div&gt;

      &lt;div class=&quot;prot-grid&quot;&gt;
        &lt;div class=&quot;prot-card built&quot;&gt;&lt;div class=&quot;prot-icon&quot;&gt;🧱&lt;/div&gt;&lt;div class=&quot;prot-name&quot;&gt;Revetment / Seawall&lt;/div&gt;&lt;div class=&quot;prot-desc&quot;&gt;Dinding penahan gelombang di sepanjang pantai&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;prot-card built&quot;&gt;&lt;div class=&quot;prot-icon&quot;&gt;🌊&lt;/div&gt;&lt;div class=&quot;prot-name&quot;&gt;Breakwater&lt;/div&gt;&lt;div class=&quot;prot-desc&quot;&gt;Pemecah gelombang sejajar pantai&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;prot-card built&quot;&gt;&lt;div class=&quot;prot-icon&quot;&gt;🏖️&lt;/div&gt;&lt;div class=&quot;prot-name&quot;&gt;Sand Nourishment&lt;/div&gt;&lt;div class=&quot;prot-desc&quot;&gt;Pengisian kembali pasir pantai&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;prot-card built&quot;&gt;&lt;div class=&quot;prot-icon&quot;&gt;🔲&lt;/div&gt;&lt;div class=&quot;prot-name&quot;&gt;Jetty&lt;/div&gt;&lt;div class=&quot;prot-desc&quot;&gt;Bangunan tegak lurus di muara sungai&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;prot-card built&quot;&gt;&lt;div class=&quot;prot-icon&quot;&gt;➡️&lt;/div&gt;&lt;div class=&quot;prot-name&quot;&gt;Groin&lt;/div&gt;&lt;div class=&quot;prot-desc&quot;&gt;Pengendali sedimen menjorok ke laut&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;

      &lt;!-- Revetment --&gt;
      &lt;div class=&quot;concept-card info&quot; style=&quot;margin:16px 0&quot;&gt;
        &lt;div style=&quot;display:flex;align-items:center;gap:10px;margin-bottom:8px&quot;&gt;
          &lt;span style=&quot;font-size:26px&quot;&gt;🧱&lt;/span&gt;
          &lt;h4 style=&quot;margin:0&quot;&gt;1. Revetment / Seawall&lt;/h4&gt;
        &lt;/div&gt;
        &lt;p&gt;&lt;strong&gt;Definisi:&lt;/strong&gt; Bangunan berupa dinding penahan gempuran gelombang yang ditempatkan di sepanjang kawasan yang akan dilindungi.&lt;/p&gt;
        &lt;p&gt;&lt;strong&gt;Tujuan:&lt;/strong&gt; Memperkuat tepi pantai agar tidak terjadi pengikisan akibat gempuran gelombang.&lt;/p&gt;
        &lt;p&gt;&lt;strong&gt;Posisi:&lt;/strong&gt; Sejajar pantai, langsung di tepi pantai (berbeda dari breakwater yang ada di depan pantai).&lt;/p&gt;
        &lt;p&gt;&lt;span class=&quot;tag tag-blue&quot;&gt;Fungsi Utama&lt;/span&gt; Melindungi tepi pantai dari benturan langsung gelombang&lt;/p&gt;
      &lt;/div&gt;

      &lt;!-- Breakwater --&gt;
      &lt;div class=&quot;concept-card info&quot; style=&quot;margin:16px 0&quot;&gt;
        &lt;div style=&quot;display:flex;align-items:center;gap:10px;margin-bottom:8px&quot;&gt;
          &lt;span style=&quot;font-size:26px&quot;&gt;🌊&lt;/span&gt;
          &lt;h4 style=&quot;margin:0&quot;&gt;2. Breakwater (Pemecah Gelombang Lepas Pantai)&lt;/h4&gt;
        &lt;/div&gt;
        &lt;p&gt;&lt;strong&gt;Definisi:&lt;/strong&gt; Bangunan yang dibuat &lt;em&gt;sejajar pantai&lt;/em&gt; dan berada pada jarak tertentu dari garis pantai.&lt;/p&gt;
        &lt;p&gt;&lt;strong&gt;Mekanisme:&lt;/strong&gt; Perlindungan terjadi karena berkurangnya energi gelombang yang sampai di perairan di belakang bangunan.&lt;/p&gt;
        &lt;p&gt;&lt;strong&gt;Variasi:&lt;/strong&gt;&lt;/p&gt;
        &lt;ul class=&quot;hlist&quot;&gt;
          &lt;li data-icon=&quot;🔹&quot;&gt;Satu pemecah gelombang (untuk pantai pendek)&lt;/li&gt;
          &lt;li data-icon=&quot;🔹&quot;&gt;Seri bangunan (beberapa ruas yang dipisahkan celah) — untuk pantai panjang&lt;/li&gt;
        &lt;/ul&gt;
        &lt;div class=&quot;callout callout-key&quot; style=&quot;margin-top:10px;padding:10px 14px&quot;&gt;
          &lt;span class=&quot;callout-icon&quot;&gt;🔑&lt;/span&gt;
          &lt;div class=&quot;callout-text&quot;&gt;Breakwater ≠ Revetment. Breakwater ada di depan pantai (di laut), revetment ada di tepi pantai langsung.&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;!-- Sand Nourishment --&gt;
      &lt;div class=&quot;concept-card warn&quot; style=&quot;margin:16px 0&quot;&gt;
        &lt;div style=&quot;display:flex;align-items:center;gap:10px;margin-bottom:8px&quot;&gt;
          &lt;span style=&quot;font-size:26px&quot;&gt;🏖️&lt;/span&gt;
          &lt;h4 style=&quot;margin:0&quot;&gt;3. Sand/Beach Nourishment (Pengisian Pasir)&lt;/h4&gt;
        &lt;/div&gt;
        &lt;p&gt;&lt;strong&gt;Definisi:&lt;/strong&gt; Tindakan pengisian kembali material sedimen (biasanya pasir) untuk menggantikan sedimen yang terbawa air laut.&lt;/p&gt;
        &lt;p&gt;&lt;strong&gt;Frekuensi:&lt;/strong&gt; Biasanya dilakukan tiap tahun → &lt;span class=&quot;tag tag-yellow&quot;&gt;Kurang efisien&lt;/span&gt;&lt;/p&gt;
        &lt;p&gt;&lt;strong&gt;Sumber pasir:&lt;/strong&gt; Pasir laut atau pasir darat, tergantung ketersediaan di lapangan.&lt;/p&gt;
        &lt;p&gt;&lt;strong&gt;Kelemahan:&lt;/strong&gt; Harus dilakukan berulang karena pasir terus terbawa arus dan gelombang.&lt;/p&gt;
      &lt;/div&gt;

      &lt;!-- Jetty --&gt;
      &lt;div class=&quot;concept-card info&quot; style=&quot;margin:16px 0&quot;&gt;
        &lt;div style=&quot;display:flex;align-items:center;gap:10px;margin-bottom:8px&quot;&gt;
          &lt;span style=&quot;font-size:26px&quot;&gt;🔲&lt;/span&gt;
          &lt;h4 style=&quot;margin:0&quot;&gt;4. Jetty&lt;/h4&gt;
        &lt;/div&gt;
        &lt;p&gt;&lt;strong&gt;Definisi:&lt;/strong&gt; Bangunan yang &lt;em&gt;tegak lurus pantai&lt;/em&gt;, diletakkan pada kedua sisi muara sungai.&lt;/p&gt;
        &lt;p&gt;&lt;strong&gt;Fungsi utama:&lt;/strong&gt;&lt;/p&gt;
        &lt;ul class=&quot;hlist&quot;&gt;
          &lt;li data-icon=&quot;✅&quot;&gt;Menahan berbeloknya muara sungai&lt;/li&gt;
          &lt;li data-icon=&quot;✅&quot;&gt;Mengkonsentrasikan aliran air pada alur yang ditetapkan&lt;/li&gt;
          &lt;li data-icon=&quot;✅&quot;&gt;Mengerosi endapan di muara, memastikan muara tetap terbuka saat awal musim hujan&lt;/li&gt;
          &lt;li data-icon=&quot;✅&quot;&gt;Mencegah pendangkalan muara oleh sedimen pantai&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;

      &lt;!-- Groin --&gt;
      &lt;div class=&quot;concept-card abrasi&quot; style=&quot;margin:16px 0&quot;&gt;
        &lt;div style=&quot;display:flex;align-items:center;gap:10px;margin-bottom:8px&quot;&gt;
          &lt;span style=&quot;font-size:26px&quot;&gt;➡️&lt;/span&gt;
          &lt;h4 style=&quot;margin:0&quot;&gt;4. Groin&lt;/h4&gt;
        &lt;/div&gt;
        &lt;p&gt;&lt;strong&gt;Definisi:&lt;/strong&gt; Bangunan pengendali sedimen yang ditempatkan &lt;em&gt;menjorok dari pantai ke arah laut lepas&lt;/em&gt;.&lt;/p&gt;
        &lt;p&gt;&lt;strong&gt;Bentuk:&lt;/strong&gt; I, L, atau T.&lt;/p&gt;
        &lt;p&gt;&lt;strong&gt;Mekanisme:&lt;/strong&gt;&lt;/p&gt;
        &lt;ul class=&quot;hlist&quot;&gt;
          &lt;li data-icon=&quot;🔹&quot;&gt;Menahan gerak sedimen sepanjang pantai&lt;/li&gt;
          &lt;li data-icon=&quot;🔹&quot;&gt;Sedimen menumpuk di sisi &lt;strong&gt;hulu (up-drift)&lt;/strong&gt;&lt;/li&gt;
          &lt;li data-icon=&quot;🔹&quot;&gt;Sisi &lt;strong&gt;hilir (down-drift)&lt;/strong&gt; mengalami defisit sedimen → erosi&lt;/li&gt;
        &lt;/ul&gt;
        &lt;div class=&quot;callout callout-warn&quot; style=&quot;margin-top:10px;padding:10px 14px&quot;&gt;
          &lt;span class=&quot;callout-icon&quot;&gt;⚠️&lt;/span&gt;
          &lt;div class=&quot;callout-text&quot;&gt;&lt;strong&gt;Efek Negatif Groin:&lt;/strong&gt; Daerah di hilir groin justru bisa mengalami abrasi lebih parah karena kurang suplai sedimen. Keseimbangan baru tercapai saat tidak ada lagi angkutan sedimen sejajar pantai.&lt;/div&gt;
        &lt;/div&gt;
        &lt;p style=&quot;margin-top:10px&quot;&gt;&lt;strong&gt;Fungsi tambahan:&lt;/strong&gt; Mencegah masuknya sedimen ke pelabuhan atau muara sungai.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- SEC 8: GLOSARIUM --&gt;
  &lt;div class=&quot;section-card&quot; id=&quot;sec8&quot;&gt;
    &lt;div class=&quot;section-header&quot; onclick=&quot;toggleSection(this)&quot;&gt;
      &lt;div class=&quot;section-title&quot;&gt;

      &lt;span class=&quot;toggle-icon&quot;&gt;⌄&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;section-body&quot;&gt;
      &lt;div class=&quot;glossary-grid&quot;&gt;
        &lt;div class=&quot;gloss-item&quot;&gt;&lt;div class=&quot;gloss-term&quot;&gt;Abrasi&lt;/div&gt;&lt;div class=&quot;gloss-def&quot;&gt;Pengikisan / berkurangnya daratan pantai akibat gelombang laut dan arus pasang surut.&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;gloss-item&quot;&gt;&lt;div class=&quot;gloss-term&quot;&gt;Akresi&lt;/div&gt;&lt;div class=&quot;gloss-def&quot;&gt;Penambahan daratan pantai baru akibat pengendapan sedimen (pasir/lumpur) oleh gelombang.&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;gloss-item&quot;&gt;&lt;div class=&quot;gloss-term&quot;&gt;Pesisir (Coast)&lt;/div&gt;&lt;div class=&quot;gloss-def&quot;&gt;Pertemuan daratan dan perairan laut yang saling mempengaruhi; zona yang lebih luas dari pantai.&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;gloss-item&quot;&gt;&lt;div class=&quot;gloss-term&quot;&gt;Pantai (Shore)&lt;/div&gt;&lt;div class=&quot;gloss-def&quot;&gt;Daerah perbatasan antara daratan dan laut, di mana terdapat garis pantai; lebih spesifik dari pesisir.&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;gloss-item&quot;&gt;&lt;div class=&quot;gloss-term&quot;&gt;Garis Pantai&lt;/div&gt;&lt;div class=&quot;gloss-def&quot;&gt;Garis batas pertemuan daratan dan air laut; posisinya tidak tetap, bergeser sesuai pasang surut dan erosi.&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;gloss-item&quot;&gt;&lt;div class=&quot;gloss-term&quot;&gt;Sempadan Pantai&lt;/div&gt;&lt;div class=&quot;gloss-def&quot;&gt;Kawasan penyangga sepanjang pantai, min. 100 m dari pasang tertinggi. Dasar: PerPres No. 51/2016.&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;gloss-item&quot;&gt;&lt;div class=&quot;gloss-term&quot;&gt;Sedimen Suspensi&lt;/div&gt;&lt;div class=&quot;gloss-def&quot;&gt;Partikel pasir/lumpur halus yang melayang dan terbawa oleh arus air.&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;gloss-item&quot;&gt;&lt;div class=&quot;gloss-term&quot;&gt;Breakwater&lt;/div&gt;&lt;div class=&quot;gloss-def&quot;&gt;Pemecah gelombang lepas pantai; dibangun sejajar pantai di depan pantai untuk mereduksi energi gelombang.&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;gloss-item&quot;&gt;&lt;div class=&quot;gloss-term&quot;&gt;Revetment / Seawall&lt;/div&gt;&lt;div class=&quot;gloss-def&quot;&gt;Dinding penahan gelombang yang dibangun langsung di tepi pantai, sejajar garis pantai.&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;gloss-item&quot;&gt;&lt;div class=&quot;gloss-term&quot;&gt;Groin&lt;/div&gt;&lt;div class=&quot;gloss-def&quot;&gt;Bangunan pengendali sedimen yang menjorok tegak lurus dari pantai ke laut; berbentuk I, L, atau T.&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;gloss-item&quot;&gt;&lt;div class=&quot;gloss-term&quot;&gt;Jetty&lt;/div&gt;&lt;div class=&quot;gloss-def&quot;&gt;Bangunan tegak lurus pantai di kedua sisi muara sungai untuk menjaga alur muara tetap terbuka.&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;gloss-item&quot;&gt;&lt;div class=&quot;gloss-term&quot;&gt;Sand Dunes&lt;/div&gt;&lt;div class=&quot;gloss-def&quot;&gt;Gundukan pasir alami di pantai, terbentuk dari kombinasi angin + pasir + vegetasi; berfungsi sebagai &quot;tembok laut&quot; alami.&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;gloss-item&quot;&gt;&lt;div class=&quot;gloss-term&quot;&gt;Sand Nourishment&lt;/div&gt;&lt;div class=&quot;gloss-def&quot;&gt;Metode pengisian kembali pasir pantai yang hilang akibat abrasi; dilakukan secara berkala (biasanya tiap tahun).&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;gloss-item&quot;&gt;&lt;div class=&quot;gloss-term&quot;&gt;Backshore&lt;/div&gt;&lt;div class=&quot;gloss-def&quot;&gt;Daerah bagian belakang pantai (ke arah darat) yang dilindungi oleh sand dunes dari hantaman air pasang.&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;gloss-item&quot;&gt;&lt;div class=&quot;gloss-term&quot;&gt;Intrusi Air Laut&lt;/div&gt;&lt;div class=&quot;gloss-def&quot;&gt;Rembesan/masuknya air laut ke dalam lapisan air tanah di daratan pesisir.&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;gloss-item&quot;&gt;&lt;div class=&quot;gloss-term&quot;&gt;Up-drift / Down-drift&lt;/div&gt;&lt;div class=&quot;gloss-def&quot;&gt;Sisi hulu dan hilir dari arah transportasi sedimen di sepanjang pantai; penting dalam analisis dampak groin.&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- SEC 9: SOAL UJIAN --&gt;
  &lt;div class=&quot;section-card&quot; id=&quot;sec9&quot;&gt;
    &lt;div class=&quot;section-header&quot; onclick=&quot;toggleSection(this)&quot;&gt;
      &lt;div class=&quot;section-title&quot;&gt;
        &lt;span&gt;❓&lt;/span&gt;
        &lt;span&gt;Potensi Soal Ujian &amp; Jawaban&lt;/span&gt;
        &lt;span class=&quot;section-badge&quot;&gt;LATIHAN&lt;/span&gt;
      &lt;/div&gt;
      &lt;span class=&quot;toggle-icon&quot;&gt;⌄&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;section-body&quot;&gt;
      &lt;div class=&quot;callout callout-exam&quot;&gt;
        &lt;span class=&quot;callout-icon&quot;&gt;🎯&lt;/span&gt;
        &lt;div class=&quot;callout-text&quot;&gt;&lt;strong&gt;Tips:&lt;/strong&gt; Klik setiap soal untuk melihat jawaban. Coba jawab sendiri dulu sebelum membuka!&lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;qna-item&quot;&gt;
        &lt;div class=&quot;qna-q&quot; onclick=&quot;toggleQna(this)&quot;&gt;
          &lt;span&gt;Q1. Jelaskan perbedaan antara abrasi dan akresi beserta penyebabnya!&lt;/span&gt;&lt;span&gt;▼&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;qna-a&quot;&gt;
          &lt;strong&gt;Abrasi&lt;/strong&gt; adalah berkurangnya/terkikisnya daratan pantai akibat gelombang laut dan arus pasang surut, sehingga garis pantai mundur ke arah darat. &lt;br&gt;&lt;br&gt;
          &lt;strong&gt;Akresi&lt;/strong&gt; adalah bertambahnya daratan pantai baru akibat pengendapan sedimen (pasir/lumpur) yang dibawa gelombang, sehingga garis pantai maju ke arah laut.&lt;br&gt;&lt;br&gt;
          Keduanya adalah dua proses oseanografi yang saling bertolak belakang dan bersama-sama membentuk garis pantai.
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;qna-item&quot;&gt;
        &lt;div class=&quot;qna-q&quot; onclick=&quot;toggleQna(this)&quot;&gt;
          &lt;span&gt;Q2. Apa perbedaan antara pantai (shore) dan pesisir (coast)?&lt;/span&gt;&lt;span&gt;▼&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;qna-a&quot;&gt;
          &lt;strong&gt;Pesisir (Coast)&lt;/strong&gt; adalah pertemuan antara daratan dan perairan laut, di mana kedua daerah tersebut saling mempengaruhi — daratan dipengaruhi pasang surut, angin laut, intrusi air laut; perairan dipengaruhi aliran air tawar dan angin darat. Cakupannya lebih luas.&lt;br&gt;&lt;br&gt;
          &lt;strong&gt;Pantai (Shore)&lt;/strong&gt; adalah daerah perbatasan antara daratan dan laut di mana terdapat garis pantai. Lebih spesifik dan sempit dibanding pesisir.
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;qna-item&quot;&gt;
        &lt;div class=&quot;qna-q&quot; onclick=&quot;toggleQna(this)&quot;&gt;
          &lt;span&gt;Q3. Sebutkan dan jelaskan 4 jenis perlindungan pantai alami!&lt;/span&gt;&lt;span&gt;▼&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;qna-a&quot;&gt;
          1. &lt;strong&gt;Terumbu Karang&lt;/strong&gt; — memecah dan menyerap energi gelombang sebelum mencapai pantai; melindungi ekosistem perairan dangkal dari abrasi.&lt;br&gt;&lt;br&gt;
          2. &lt;strong&gt;Mangrove/Vegetasi&lt;/strong&gt; — akar mangrove meredam energi gelombang, menahan abrasi, mengurangi risiko banjir, menjaga penghidupan masyarakat pesisir.&lt;br&gt;&lt;br&gt;
          3. &lt;strong&gt;Sand Dunes (Gundukan Pasir)&lt;/strong&gt; — cadangan pasir alami, berfungsi sebagai tembok laut yang menahan air pasang dan gelombang dari daerah backshore.&lt;br&gt;&lt;br&gt;
          4. &lt;strong&gt;Pantai Lumpur Dangkal&lt;/strong&gt; — dataran luas dan datar yang meredam energi gelombang; merupakan habitat subur bagi mangrove.
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;qna-item&quot;&gt;
        &lt;div class=&quot;qna-q&quot; onclick=&quot;toggleQna(this)&quot;&gt;
          &lt;span&gt;Q4. Apa itu sempadan pantai dan berapa ukuran minimalnya menurut peraturan?&lt;/span&gt;&lt;span&gt;▼&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;qna-a&quot;&gt;
          &lt;strong&gt;Sempadan pantai&lt;/strong&gt; adalah kawasan tertentu sepanjang pantai yang mempunyai manfaat penting untuk mempertahankan kelestarian fungsi pantai.&lt;br&gt;&lt;br&gt;
          Kriteria: daratan sepanjang tepian pantai, lebarnya sesuai bentuk dan kondisi fisik pantai, minimal &lt;strong&gt;100 meter&lt;/strong&gt; dari titik pasang tertinggi ke arah daratan.&lt;br&gt;&lt;br&gt;
          Dasar hukum: &lt;strong&gt;PerPres No. 51 Tahun 2016&lt;/strong&gt; tentang Batas Sempadan Pantai.
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;qna-item&quot;&gt;
        &lt;div class=&quot;qna-q&quot; onclick=&quot;toggleQna(this)&quot;&gt;
          &lt;span&gt;Q5. Bagaimana mekanisme kerja groin dan apa efek negatifnya?&lt;/span&gt;&lt;span&gt;▼&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;qna-a&quot;&gt;
          &lt;strong&gt;Mekanisme:&lt;/strong&gt; Groin adalah bangunan yang menjorok dari pantai ke laut (berbentuk I, L, T) yang menahan transportasi sedimen sepanjang pantai. Sedimen tertahan dan mengendap di sisi hulu (up-drift) dari groin.&lt;br&gt;&lt;br&gt;
          &lt;strong&gt;Efek Negatif:&lt;/strong&gt; Di sisi hilir (down-drift), angkutan sedimen terus terjadi tetapi suplai dari hulu terhalang oleh groin. Akibatnya, daerah hilir mengalami defisit sedimen → abrasi/erosi. Kondisi ini berlanjut sampai tercapai keseimbangan baru (saat angkutan sedimen sejajar pantai = 0).
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;qna-item&quot;&gt;
        &lt;div class=&quot;qna-q&quot; onclick=&quot;toggleQna(this)&quot;&gt;
          &lt;span&gt;Q6. Apa perbedaan antara breakwater dan revetment?&lt;/span&gt;&lt;span&gt;▼&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;qna-a&quot;&gt;
          &lt;strong&gt;Breakwater (Pemecah Gelombang):&lt;/strong&gt; Dibangun sejajar pantai tetapi berada di depan pantai, pada jarak tertentu dari garis pantai (di laut). Melindungi pantai dengan cara mengurangi energi gelombang di perairan di belakang bangunan.&lt;br&gt;&lt;br&gt;
          &lt;strong&gt;Revetment/Seawall:&lt;/strong&gt; Dibangun langsung di tepi pantai, sepanjang kawasan yang dilindungi. Memperkuat tepi pantai agar tidak terjadi pengikisan langsung oleh hantaman gelombang.&lt;br&gt;&lt;br&gt;
          &lt;em&gt;Singkatnya: Breakwater = di laut (depan pantai); Revetment = di tepi pantai langsung.&lt;/em&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;qna-item&quot;&gt;
        &lt;div class=&quot;qna-q&quot; onclick=&quot;toggleQna(this)&quot;&gt;
          &lt;span&gt;Q7. Mengapa mangrove dianggap sebagai pelindung pantai yang sangat penting?&lt;/span&gt;&lt;span&gt;▼&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;qna-a&quot;&gt;
          Mangrove yang tumbuh di garis pantai dan muara sungai berfungsi sebagai:&lt;br&gt;
          1. &lt;strong&gt;Penahan abrasi air laut&lt;/strong&gt; — sistem akar yang kompleks meredam energi gelombang&lt;br&gt;
          2. &lt;strong&gt;Pengurang risiko banjir&lt;/strong&gt; — menghalangi masuknya air ke pemukiman&lt;br&gt;
          3. &lt;strong&gt;Penjaga penghidupan&lt;/strong&gt; — habitat ikan dan biota laut yang menjadi sumber pangan masyarakat&lt;br&gt;
          4. &lt;strong&gt;Penghalang angin dan ombak&lt;/strong&gt; bagi rumah penduduk pesisir&lt;br&gt;&lt;br&gt;
          Mangrove bukan sekadar tanaman biasa, tetapi merupakan infrastruktur hijau alami yang menggabungkan fungsi ekologis dan sosial ekonomi sekaligus.
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;qna-item&quot;&gt;
        &lt;div class=&quot;qna-q&quot; onclick=&quot;toggleQna(this)&quot;&gt;
          &lt;span&gt;Q8. Apa itu Sand/Beach Nourishment dan mengapa metode ini dianggap kurang efisien?&lt;/span&gt;&lt;span&gt;▼&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;qna-a&quot;&gt;
          &lt;strong&gt;Sand/Beach Nourishment&lt;/strong&gt; adalah tindakan pengisian kembali material sedimen (biasanya pasir) untuk menggantikan sedimen yang terbawa air laut akibat abrasi.&lt;br&gt;&lt;br&gt;
          &lt;strong&gt;Alasan kurang efisien:&lt;/strong&gt;&lt;br&gt;
          - Pengisian harus dilakukan secara berulang, biasanya tiap tahun&lt;br&gt;
          - Pasir yang diisikan kembali pun akan terbawa kembali oleh arus dan gelombang&lt;br&gt;
          - Membutuhkan biaya transportasi pasir dari sumber (laut/darat) ke lokasi pengisian&lt;br&gt;
          - Tidak menyelesaikan akar masalah (energi gelombang), hanya mengganti material yang hilang
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;qna-item&quot;&gt;
        &lt;div class=&quot;qna-q&quot; onclick=&quot;toggleQna(this)&quot;&gt;
          &lt;span&gt;Q9. Jelaskan fungsi jetty dan bedakan dengan groin!&lt;/span&gt;&lt;span&gt;▼&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;qna-a&quot;&gt;
          &lt;strong&gt;Jetty:&lt;/strong&gt; Bangunan tegak lurus pantai yang diletakkan di kedua sisi muara sungai. Fungsi utama: menahan berbeloknya muara sungai, mengkonsentrasikan aliran, mengerosi endapan di muara agar muara tetap terbuka, mencegah pendangkalan muara oleh sedimen pantai.&lt;br&gt;&lt;br&gt;
          &lt;strong&gt;Groin:&lt;/strong&gt; Bangunan yang menjorok dari pantai ke laut, berfungsi menahan transportasi sedimen sepanjang pantai dan mencegah sedimen masuk ke pelabuhan/muara.&lt;br&gt;&lt;br&gt;
          &lt;strong&gt;Perbedaan utama:&lt;/strong&gt; Jetty ditempatkan DI muara sungai (dua sisi), groin ditempatkan di pantai terbuka untuk mengendalikan sedimen lateral.
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;qna-item&quot;&gt;
        &lt;div class=&quot;qna-q&quot; onclick=&quot;toggleQna(this)&quot;&gt;
          &lt;span&gt;Q10. Bagaimana sand dunes terbentuk dan mengapa penting untuk tidak mengganggunya?&lt;/span&gt;&lt;span&gt;▼&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;qna-a&quot;&gt;
          &lt;strong&gt;Pembentukan Sand Dunes:&lt;/strong&gt; Terbentuk secara alami melalui kombinasi tiga faktor — gerakan pasir + angin + tumbuhan pantai. Angin membawa pasir dan menumpuknya, vegetasi pantai menahan pasir agar tidak mudah tersebar.&lt;br&gt;&lt;br&gt;
          &lt;strong&gt;Fungsi penting:&lt;/strong&gt; Menyimpan pasir saat pasang, berfungsi sebagai tanggul alami menghalangi gelombang merusak daerah backshore, merupakan &quot;tembok laut&quot; non-rigid yang elastis.&lt;br&gt;&lt;br&gt;
          &lt;strong&gt;Mengapa tidak boleh diganggu:&lt;/strong&gt; Jika tidak terganggu aktivitas manusia, sand dunes membentuk sistem perlindungan yang kontinyu dan dapat diandalkan dari waktu ke waktu. Gangguan manusia (pembangunan, penambangan pasir) merusak sistem perlindungan alami yang sangat berharga ini.
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;qna-item&quot;&gt;
        &lt;div class=&quot;qna-q&quot; onclick=&quot;toggleQna(this)&quot;&gt;
          &lt;span&gt;Q11. Sebutkan faktor-faktor yang menyebabkan garis pantai berubah!&lt;/span&gt;&lt;span&gt;▼&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;qna-a&quot;&gt;
          Garis pantai berubah karena:&lt;br&gt;
          1. &lt;strong&gt;Abrasi&lt;/strong&gt; — pengikisan oleh gelombang → garis pantai mundur&lt;br&gt;
          2. &lt;strong&gt;Akresi&lt;/strong&gt; — sedimentasi oleh arus → garis pantai maju&lt;br&gt;
          3. &lt;strong&gt;Pasang surut&lt;/strong&gt; — perubahan permukaan air laut secara periodik&lt;br&gt;
          4. &lt;strong&gt;Arus pantai&lt;/strong&gt; — mengangkut sedimen sepanjang garis pantai&lt;br&gt;
          5. &lt;strong&gt;Aktivitas manusia&lt;/strong&gt; — pembangunan groin, breakwater, jetty, dan penambangan pasir semuanya mempengaruhi distribusi sedimen dan posisi garis pantai
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;qna-item&quot;&gt;
        &lt;div class=&quot;qna-q&quot; onclick=&quot;toggleQna(this)&quot;&gt;
          &lt;span&gt;Q12. Apa yang dimaksud pantai berlumpur dangkal dan bagaimana hubungannya dengan akresi?&lt;/span&gt;&lt;span&gt;▼&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;qna-a&quot;&gt;
          &lt;strong&gt;Pantai berlumpur dangkal&lt;/strong&gt; terjadi di pantai yang banyak muara sungai membawa sedimen suspensi ke laut dalam jumlah besar. Gelombang di pantai tersebut relatif tenang sehingga tidak mampu membawa sedimen ke perairan dalam.&lt;br&gt;&lt;br&gt;
          &lt;strong&gt;Hubungan dengan akresi:&lt;/strong&gt; Sedimen suspensi yang tidak terbawa ke laut dalam mengendap di daerah perairan dangkal, menyebar ke area luas, dan secara bertahap membentuk dataran pantai yang luas, datar, dan dangkal — inilah bentuk akresi. Proses ini menghasilkan daerah yang subur untuk mangrove, yang pada gilirannya memperkuat perlindungan pantai secara alami.
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

      &lt;h3 style=&quot;margin-top:20px&quot;&gt;🟡 Perbandingan yang Sering Ditanyakan&lt;/h3&gt;

        &lt;table&gt;
          &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Topik&lt;/th&gt;&lt;th&gt;A&lt;/th&gt;&lt;th&gt;vs&lt;/th&gt;&lt;th&gt;B&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;Fenomena pantai&lt;/td&gt;&lt;td&gt;Abrasi (erosi)&lt;/td&gt;&lt;td&gt;≠&lt;/td&gt;&lt;td&gt;Akresi (sedimentasi)&lt;/td&gt;&lt;/tr&gt;

            &lt;tr&gt;&lt;td&gt;Efek groin&lt;/td&gt;&lt;td&gt;Hulu: akresi&lt;/td&gt;&lt;td&gt;≠&lt;/td&gt;&lt;td&gt;Hilir: abrasi&lt;/td&gt;&lt;/tr&gt;

      &lt;h3 style=&quot;margin-top:20px&quot;&gt;🟢 Tips Menghafal Cepat&lt;/h3&gt;
      &lt;div class=&quot;two-col&quot;&gt;
        &lt;div class=&quot;concept-card akresi&quot;&gt;

&lt;script&gt;
  // Toggle sections
  function toggleSection(header) {
    const body = header.nextElementSibling;
    const icon = header.querySelector(&#x27;.toggle-icon&#x27;);
    const isOpen = body.classList.contains(&#x27;open&#x27;);
    if (isOpen) {
      body.classList.remove(&#x27;open&#x27;);
      header.classList.remove(&#x27;open&#x27;);
      icon.classList.remove(&#x27;rotated&#x27;);
    } else {
      body.classList.add(&#x27;open&#x27;);
      header.classList.add(&#x27;open&#x27;);
      icon.classList.add(&#x27;rotated&#x27;);
    }
  }

  // Toggle QnA
  function toggleQna(qEl) {
    const answer = qEl.nextElementSibling;
    const icon = qEl.querySelector(&#x27;span:last-child&#x27;);
    if (answer.classList.contains(&#x27;open&#x27;)) {
      answer.classList.remove(&#x27;open&#x27;);
      icon.textContent = &#x27;▼&#x27;;
    } else {
      answer.classList.add(&#x27;open&#x27;);
      icon.textContent = &#x27;▲&#x27;;
    }
  }

  // Progress bar
  window.addEventListener(&#x27;scroll&#x27;, () =&gt; {
    const total = document.body.scrollHeight - window.innerHeight;
    const progress = (window.scrollY / total) * 100;
    document.getElementById(&#x27;progress-bar&#x27;).style.width = progress + &#x27;%&#x27;;
    document.getElementById(&#x27;back-top&#x27;).classList.toggle(&#x27;visible&#x27;, window.scrollY &gt; 300);
  });

  // Search
  const searchInput = document.getElementById(&#x27;searchInput&#x27;);
  let originalContent = {};

  searchInput.addEventListener(&#x27;input&#x27;, function() {
    const query = this.value.trim().toLowerCase();
    const sections = document.querySelectorAll(&#x27;.section-card&#x27;);

    // Remove existing highlights
    document.querySelectorAll(&#x27;mark&#x27;).forEach(m =&gt; {
      m.replaceWith(m.textContent);
    });

    if (!query) {
      sections.forEach(s =&gt; s.classList.remove(&#x27;hidden&#x27;));
      return;
    }

    sections.forEach(section =&gt; {
      const text = section.innerText.toLowerCase();
      if (text.includes(query)) {
        section.classList.remove(&#x27;hidden&#x27;);
        // Open section body
        const body = section.querySelector(&#x27;.section-body&#x27;);
        const header = section.querySelector(&#x27;.section-header&#x27;);
        const icon = section.querySelector(&#x27;.toggle-icon&#x27;);
        if (!body.classList.contains(&#x27;open&#x27;)) {
          body.classList.add(&#x27;open&#x27;);
          header.classList.add(&#x27;open&#x27;);
          if(icon) icon.classList.add(&#x27;rotated&#x27;);
        }
        // Highlight matches
        highlightText(body, query);
      } else {
        section.classList.add(&#x27;hidden&#x27;);
      }
    });
  });

  function highlightText(container, query) {
    const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
    const nodes = [];
    let node;
    while (node = walker.nextNode()) {
      if (node.textContent.toLowerCase().includes(query)) {
        nodes.push(node);
      }
    }
    nodes.forEach(n =&gt; {
      const regex = new RegExp(`(${query})`, &#x27;gi&#x27;);
      const span = document.createElement(&#x27;span&#x27;);
      span.innerHTML = n.textContent.replace(regex, &#x27;&lt;mark&gt;$1&lt;/mark&gt;&#x27;);
      n.parentNode.replaceChild(span, n);
    });
  }

  // Smooth scroll for TOC
  document.querySelectorAll(&#x27;.toc-item&#x27;).forEach(link =&gt; {
    link.addEventListener(&#x27;click&#x27;, function(e) {
      e.preventDefault();
      const target = document.querySelector(this.getAttribute(&#x27;href&#x27;));
      if (target) {
        target.scrollIntoView({ behavior: &#x27;smooth&#x27;, block: &#x27;start&#x27; });
        // Open section
        const body = target.querySelector(&#x27;.section-body&#x27;);
        const header = target.querySelector(&#x27;.section-header&#x27;);
        const icon = target.querySelector(&#x27;.toggle-icon&#x27;);
        if (body &amp;&amp; !body.classList.contains(&#x27;open&#x27;)) {
          body.classList.add(&#x27;open&#x27;);
          if(header) header.classList.add(&#x27;open&#x27;);
          if(icon) icon.classList.add(&#x27;rotated&#x27;);
        }
      }
    });
  });

&lt;!-- ===== SECTION 1: RINGKASAN ===== --&gt;
&lt;section id=&quot;ringkasan&quot;&gt;
  &lt;div class=&quot;section-header&quot;&gt;
    &lt;div class=&quot;section-icon icon-blue&quot;&gt;📋&lt;/div&gt;
    &lt;div&gt;
      &lt;h2&gt;Ringkasan Materi&lt;/h2&gt;
      &lt;p style=&quot;color:#5d8aa8;font-size:0.93rem;margin-top:2px;&quot;&gt;Resume sistematis seluruh topik pasang surut air laut&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;def-box&quot;&gt;
    &lt;h3&gt;Definisi Utama&lt;/h3&gt;
    &lt;p&gt;&lt;strong&gt;Pasang Surut&lt;/strong&gt; adalah fenomena naik turunnya permukaan air laut secara periodik, yang disebabkan oleh kombinasi &lt;strong&gt;gravitasi dan gaya tarik menarik benda-benda astronomi&lt;/strong&gt;, terutama matahari, bumi, dan bulan. Puncak elevasi disebut &lt;strong&gt;pasang tinggi&lt;/strong&gt;, lembah elevasi disebut &lt;strong&gt;pasang rendah&lt;/strong&gt;.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;grid-2&quot;&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-title&quot;&gt;🧮 Tidal Range (Periode Pasang Surut)&lt;/div&gt;
      &lt;p&gt;Tidal Range adalah waktu antara puncak atau lembah gelombang ke puncak atau lembah gelombang berikutnya. Dalam satu siklus bulanan, terjadi &lt;strong&gt;2× pasang tinggi tertinggi&lt;/strong&gt; dan &lt;strong&gt;2× pasang rendah terendah&lt;/strong&gt;, yaitu saat konjungsi dan oposisi.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card green&quot;&gt;
      &lt;div class=&quot;card-title&quot;&gt;🌑🌕 Konjungsi &amp; Oposisi&lt;/div&gt;
      &lt;ul class=&quot;nice&quot;&gt;
        &lt;li&gt;&lt;strong&gt;Konjungsi:&lt;/strong&gt; Bulan berada di antara Bumi dan Matahari → sisi bulan menghadap bumi tidak menerima cahaya → &lt;em&gt;Bulan Baru (New Moon)&lt;/em&gt;&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Oposisi:&lt;/strong&gt; Bulan di sisi berlawanan dari Bumi dibanding Matahari → seluruh sisi bulan yang menghadap bumi diterangi → &lt;em&gt;Bulan Purnama (Full Moon)&lt;/em&gt;&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;highlight-blue&quot;&gt;
    &lt;strong&gt;📌 Inti Materi:&lt;/strong&gt; Ada dua teori utama yang menjelaskan pasang surut (Kesetimbangan &amp; Dinamis), dua jenis utama pasang (Purnama &amp; Perbani), dan tiga tipe berdasarkan frekuensi harian (Diurnal, Semi-Diurnal, Mixed). Dampaknya penting bagi pariwisata bahari, terutama di Bali.
  &lt;/div&gt;

  &lt;div class=&quot;tbl-wrap&quot;&gt;
    &lt;table&gt;
      &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Topik&lt;/th&gt;&lt;th&gt;Konsep Kunci&lt;/th&gt;&lt;th&gt;Contoh/Lokasi&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Definisi&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Naik turun permukaan laut secara periodik akibat gravitasi benda astronomi&lt;/td&gt;&lt;td&gt;Tanah Lot Bali (pasang vs surut)&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Teori Kesetimbangan&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Newton (1642–1727); permukaan laut naik sebanding gaya pembangkit&lt;/td&gt;&lt;td&gt;Faktor: rotasi bumi, revolusi bulan &amp; bumi&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Teori Dinamis&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Gaya pembangkit → gelombang pasut; mempertimbangkan kedalaman, Coriolis, gesekan&lt;/td&gt;&lt;td&gt;Faktor: kedalaman perairan, Coriolis, gesekan dasar&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Pasang Purnama&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Bumi-Bulan-Matahari segaris → pasang sangat tinggi &amp; surut sangat rendah&lt;/td&gt;&lt;td&gt;Saat Bulan Baru &amp; Bulan Purnama&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Pasang Perbani&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Bumi-Bulan-Matahari membentuk sudut tegak lurus → pasang rendah&lt;/td&gt;&lt;td&gt;Saat bulan seperempat &amp; tiga perempat&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Diurnal&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;1× pasang tinggi &amp; 1× pasang rendah per hari&lt;/td&gt;&lt;td&gt;Selat Karimata&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Semi-Diurnal&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;2× pasang tinggi &amp; 2× pasang rendah per hari (hampir sama)&lt;/td&gt;&lt;td&gt;Selat Malaka, Laut Andaman&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Mixed Prevailing Diurnal&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;2× pasang tinggi &amp; 2× pasang rendah per hari (ketinggian berbeda)&lt;/td&gt;&lt;td&gt;Banyak wilayah Indonesia&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Dampak Pariwisata&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Kolam pasang surut, snorkeling, selancar, wisata jelajah pantai&lt;/td&gt;&lt;td&gt;Bali/Tanah Lot&lt;/td&gt;&lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;
  &lt;/div&gt;
&lt;/section&gt;

&lt;!-- ===== SECTION 2: CATATAN LENGKAP ===== --&gt;
&lt;section id=&quot;catatan&quot;&gt;
  &lt;div class=&quot;section-header&quot;&gt;
    &lt;div class=&quot;section-icon icon-green&quot;&gt;📖&lt;/div&gt;
    &lt;div&gt;
      &lt;h2&gt;Catatan Belajar Lengkap&lt;/h2&gt;
      &lt;p style=&quot;color:#5d8aa8;font-size:0.93rem;margin-top:2px;&quot;&gt;Penjelasan rinci setiap topik dari materi kuliah&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- 2.1 DEFINISI --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;🌊 1. Definisi &amp; Konsep Dasar Pasang Surut&lt;/div&gt;
    &lt;p style=&quot;margin-bottom:12px;&quot;&gt;&lt;strong&gt;Pasang Surut (Tidal)&lt;/strong&gt; adalah fenomena naik-turunnya permukaan air laut secara periodik akibat kombinasi gravitasi dan gaya tarik menarik benda astronomi, khususnya Matahari, Bumi, dan Bulan.&lt;/p&gt;
    
    &lt;div class=&quot;highlight&quot;&gt;
      &lt;strong&gt;Terminologi Penting:&lt;/strong&gt;
      &lt;ul class=&quot;nice&quot; style=&quot;margin-top:8px;&quot;&gt;
        &lt;li&gt;&lt;strong&gt;Pasang Tinggi (High Tide)&lt;/strong&gt; — Puncak elevasi permukaan air laut&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Pasang Rendah (Low Tide)&lt;/strong&gt; — Lembah elevasi permukaan air laut&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Tidal Range / Periode Pasang Surut&lt;/strong&gt; — Waktu antara puncak/lembah gelombang ke puncak/lembah gelombang berikutnya&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Konjungsi&lt;/strong&gt; — Bulan di antara Bumi dan Matahari (Bulan Baru/New Moon)&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Oposisi&lt;/strong&gt; — Bulan di sisi berlawanan dari Matahari terhadap Bumi (Bulan Purnama/Full Moon)&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;

    &lt;p&gt;Dalam satu siklus bulanan, terjadi &lt;strong&gt;2 kali pasang tinggi tertinggi&lt;/strong&gt; dan &lt;strong&gt;2 kali pasang rendah terendah&lt;/strong&gt; yaitu saat konjungsi (Bulan Baru) dan oposisi (Bulan Purnama). Fenomena ini menghasilkan apa yang disebut &lt;em&gt;Spring Tide&lt;/em&gt; (Pasang Purnama).&lt;/p&gt;
  &lt;/div&gt;

  &lt;!-- 2.2 TEORI --&gt;
  &lt;h3&gt;🔬 2. Teori Pasang Surut Air Laut&lt;/h3&gt;
  &lt;div class=&quot;grid-2&quot;&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-title&quot;&gt;⚖️ Teori Kesetimbangan (Equilibrium Theory)&lt;/div&gt;
      &lt;ul class=&quot;nice&quot;&gt;
        &lt;li&gt;Diperkenalkan pertama kali oleh &lt;strong&gt;Sir Isaac Newton (1642–1727)&lt;/strong&gt;&lt;/li&gt;
        &lt;li&gt;Menjelaskan sifat-sifat pasang surut secara &lt;strong&gt;kualitatif&lt;/strong&gt;&lt;/li&gt;
        &lt;li&gt;Menyatakan bahwa naik-turunnya permukaan laut &lt;strong&gt;sebanding dengan gaya pembangkit pasang surut&lt;/strong&gt;&lt;/li&gt;
        &lt;li&gt;Diasumsikan pada Bumi ideal: berbentuk &lt;strong&gt;bulat sempurna&lt;/strong&gt;, seluruh permukaannya ditutupi air dengan distribusi massa seragam, mengabaikan pengaruh kelembaman (Inertia)&lt;/li&gt;
        &lt;li&gt;Berkaitan dengan hubungan antara &lt;strong&gt;laut, massa air yang naik, bulan, dan matahari&lt;/strong&gt;&lt;/li&gt;
        &lt;li&gt;Pembangkit pasang surut dibagi menjadi 2 sistem: &lt;strong&gt;sistem Bumi-Bulan&lt;/strong&gt; dan &lt;strong&gt;sistem Bumi-Matahari&lt;/strong&gt;&lt;/li&gt;
        &lt;li&gt;Gaya pembangkit akan menimbulkan &lt;strong&gt;air tinggi di 2 lokasi&lt;/strong&gt; dan &lt;strong&gt;air rendah di 2 lokasi&lt;/strong&gt;&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card orange&quot;&gt;
      &lt;div class=&quot;card-title&quot;&gt;🌊 Teori Pasut Dinamik (Dynamical Theory)&lt;/div&gt;
      &lt;ul class=&quot;nice&quot;&gt;
        &lt;li&gt;Menurut teori dinamis, gaya pembangkit pasut menghasilkan &lt;strong&gt;gelombang pasut (tide wave)&lt;/strong&gt; yang periodenya sebanding dengan gaya pembangkit pasut&lt;/li&gt;
        &lt;li&gt;Lautan yang homogen diasumsikan masih menutupi seluruh Bumi pada &lt;strong&gt;kedalaman yang konstan&lt;/strong&gt;&lt;/li&gt;
        &lt;li&gt;Gaya-gaya tarik periodik dapat membangkitkan gelombang dengan periode sesuai dengan &lt;strong&gt;konstituenkonstituennya&lt;/strong&gt;&lt;/li&gt;
        &lt;li&gt;Mempertimbangkan pengaruh nyata seperti kedalaman perairan, gaya Coriolis, dan gesekan dasar laut&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- 2.3 FAKTOR PENYEBAB --&gt;
  &lt;h3&gt;⚙️ 3. Faktor Penyebab Terjadinya Pasang Surut&lt;/h3&gt;
  &lt;div class=&quot;grid-2&quot;&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-title&quot;&gt;⚖️ Menurut Teori Kesetimbangan&lt;/div&gt;
      &lt;ol class=&quot;nice&quot;&gt;
        &lt;li&gt;&lt;strong&gt;Rotasi Bumi pada sumbunya&lt;/strong&gt;&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Revolusi Bulan terhadap Matahari&lt;/strong&gt;&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Revolusi Bumi terhadap Matahari&lt;/strong&gt;&lt;/li&gt;
      &lt;/ol&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card orange&quot;&gt;
      &lt;div class=&quot;card-title&quot;&gt;🌊 Menurut Teori Dinamis&lt;/div&gt;
      &lt;ol class=&quot;nice&quot;&gt;
        &lt;li&gt;&lt;strong&gt;Kedalaman dan luas perairan&lt;/strong&gt;&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Pengaruh rotasi Bumi (Gaya Coriolis)&lt;/strong&gt;&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Gesekan dasar&lt;/strong&gt; (bottom friction)&lt;/li&gt;
      &lt;/ol&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- 2.4 JENIS BERDASARKAN POSISI --&gt;
  &lt;h3&gt;🌑🌕 4. Jenis Pasang Surut Berdasarkan Posisi Bumi-Bulan-Matahari&lt;/h3&gt;
  &lt;div class=&quot;grid-2&quot;&gt;
    &lt;div class=&quot;card red&quot;&gt;
      &lt;div class=&quot;card-title&quot;&gt;🌕 Pasang Purnama (Spring Tide / Pasang Purnama)&lt;/div&gt;
      &lt;ul class=&quot;nice&quot;&gt;
        &lt;li&gt;Terjadi ketika &lt;strong&gt;Bumi, Bulan, dan Matahari berada dalam satu garis lurus&lt;/strong&gt;&lt;/li&gt;
        &lt;li&gt;Terjadi pada saat &lt;strong&gt;Bulan Baru (New Moon)&lt;/strong&gt; dan &lt;strong&gt;Bulan Purnama (Full Moon)&lt;/strong&gt;&lt;/li&gt;
        &lt;li&gt;Lunar Tide + Solar Tide bekerja bersamaan → &lt;strong&gt;saling memperkuat&lt;/strong&gt;&lt;/li&gt;
        &lt;li&gt;Menghasilkan &lt;strong&gt;pasang yang sangat tinggi&lt;/strong&gt; dan &lt;strong&gt;surut yang sangat rendah&lt;/strong&gt;&lt;/li&gt;
        &lt;li&gt;Terjadi dua kali dalam satu siklus bulanan (Minggu 1 &amp; Minggu 3)&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card moon&quot;&gt;
      &lt;div class=&quot;card-title&quot;&gt;🌗 Pasang Perbani (Neap Tide / Pasang Perbani)&lt;/div&gt;
      &lt;ul class=&quot;nice&quot;&gt;
        &lt;li&gt;Terjadi ketika &lt;strong&gt;Bumi, Bulan, dan Matahari membentuk sudut tegak lurus (90°)&lt;/strong&gt;&lt;/li&gt;
        &lt;li&gt;Terjadi pada saat &lt;strong&gt;Bulan Seperempat (First Quarter)&lt;/strong&gt; dan &lt;strong&gt;Bulan Tiga Perempat (Third Quarter)&lt;/strong&gt;&lt;/li&gt;
        &lt;li&gt;Lunar Tide dan Solar Tide &lt;strong&gt;saling berlawanan arah&lt;/strong&gt; → melemahkan satu sama lain&lt;/li&gt;
        &lt;li&gt;Menghasilkan &lt;strong&gt;pasang yang rendah&lt;/strong&gt; dan &lt;strong&gt;surut yang tinggi&lt;/strong&gt; (range kecil)&lt;/li&gt;
        &lt;li&gt;Terjadi dua kali dalam satu siklus bulanan (Minggu 2 &amp; Minggu 4)&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Siklus bulanan diagram --&gt;
  &lt;div class=&quot;highlight-blue&quot; style=&quot;text-align:center;&quot;&gt;
    &lt;strong style=&quot;display:block;margin-bottom:16px;color:var(--ocean-deep);&quot;&gt;📅 Siklus Pasang Surut dalam Satu Bulan&lt;/strong&gt;
    &lt;div class=&quot;tide-cycle&quot;&gt;
      &lt;div class=&quot;moon-phase&quot;&gt;
        &lt;div class=&quot;moon-icon new&quot;&gt;&lt;/div&gt;
        &lt;div class=&quot;moon-label&quot;&gt;Bulan Baru&lt;/div&gt;
        &lt;div class=&quot;tide-label spring&quot;&gt;Spring&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;arrow&quot;&gt;→&lt;/div&gt;
      &lt;div class=&quot;moon-phase&quot;&gt;
        &lt;div class=&quot;moon-icon first&quot;&gt;&lt;/div&gt;
        &lt;div class=&quot;moon-label&quot;&gt;Kuarter Pertama&lt;/div&gt;
        &lt;div class=&quot;tide-label neap&quot;&gt;Neap&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;arrow&quot;&gt;→&lt;/div&gt;
      &lt;div class=&quot;moon-phase&quot;&gt;
        &lt;div class=&quot;moon-icon full&quot;&gt;&lt;/div&gt;
        &lt;div class=&quot;moon-label&quot;&gt;Bulan Purnama&lt;/div&gt;
        &lt;div class=&quot;tide-label spring&quot;&gt;Spring&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;arrow&quot;&gt;→&lt;/div&gt;
      &lt;div class=&quot;moon-phase&quot;&gt;
        &lt;div class=&quot;moon-icon third&quot;&gt;&lt;/div&gt;
        &lt;div class=&quot;moon-label&quot;&gt;Kuarter Ketiga&lt;/div&gt;
        &lt;div class=&quot;tide-label neap&quot;&gt;Neap&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;arrow&quot;&gt;→&lt;/div&gt;
      &lt;div class=&quot;moon-phase&quot;&gt;
        &lt;div class=&quot;moon-icon new&quot;&gt;&lt;/div&gt;
        &lt;div class=&quot;moon-label&quot;&gt;Bulan Baru (ulang)&lt;/div&gt;
        &lt;div class=&quot;tide-label spring&quot;&gt;Spring&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- 2.5 TIPE BERDASARKAN FREKUENSI --&gt;
  &lt;h3&gt;📊 5. Tipe Pasang Surut Berdasarkan Frekuensi Harian&lt;/h3&gt;
  &lt;div class=&quot;tbl-wrap&quot;&gt;
    &lt;table&gt;
      &lt;thead&gt;
        &lt;tr&gt;
          &lt;th&gt;Tipe&lt;/th&gt;
          &lt;th&gt;Nama Indonesia&lt;/th&gt;
          &lt;th&gt;Frekuensi&lt;/th&gt;
          &lt;th&gt;Karakteristik&lt;/th&gt;
          &lt;th&gt;Contoh Lokasi&lt;/th&gt;
        &lt;/tr&gt;
      &lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;
          &lt;td&gt;&lt;span class=&quot;badge badge-blue&quot;&gt;Diurnal Tide&lt;/span&gt;&lt;/td&gt;
          &lt;td&gt;Pasang surut harian tunggal&lt;/td&gt;
          &lt;td&gt;1× pasang tinggi + 1× pasang rendah per hari&lt;/td&gt;
          &lt;td&gt;Satu siklus penuh dalam ~24 jam; ketinggian relatif seragam&lt;/td&gt;
          &lt;td&gt;&lt;strong&gt;Selat Karimata&lt;/strong&gt;&lt;/td&gt;
        &lt;/tr&gt;
        &lt;tr&gt;
          &lt;td&gt;&lt;span class=&quot;badge badge-green&quot;&gt;Semi-Diurnal&lt;/span&gt;&lt;/td&gt;
          &lt;td&gt;Pasang surut harian ganda&lt;/td&gt;
          &lt;td&gt;2× pasang tinggi + 2× pasang rendah per hari&lt;/td&gt;
          &lt;td&gt;Dua siklus penuh dalam ~24 jam; kedua puncak ketinggiannya hampir sama&lt;/td&gt;
          &lt;td&gt;&lt;strong&gt;Selat Malaka, Laut Andaman&lt;/strong&gt;&lt;/td&gt;
        &lt;/tr&gt;
        &lt;tr&gt;
          &lt;td&gt;&lt;span class=&quot;badge badge-orange&quot;&gt;Mixed Prevailing Diurnal&lt;/span&gt;&lt;/td&gt;
          &lt;td&gt;Campuran condong harian tunggal&lt;/td&gt;
          &lt;td&gt;2× pasang tinggi + 2× pasang rendah per hari&lt;/td&gt;
          &lt;td&gt;Dua siklus per hari tetapi ketinggian puncak &lt;strong&gt;tidak sama&lt;/strong&gt;; dominan diurnal&lt;/td&gt;
          &lt;td&gt;Banyak wilayah Indonesia&lt;/td&gt;
        &lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;
  &lt;/div&gt;

  &lt;div class=&quot;highlight&quot;&gt;
    &lt;strong&gt;⚠️ Penting untuk Ujian:&lt;/strong&gt; Di Indonesia, pasang diurnal dapat ditemukan di beberapa wilayah seperti &lt;strong&gt;Selat Karimata&lt;/strong&gt;. Contoh wilayah yang mengalami pasang surut semi-diurnal adalah &lt;strong&gt;Selat Malaka dan Laut Andaman&lt;/strong&gt;.
  &lt;/div&gt;

  &lt;!-- 2.6 DAMPAK --&gt;
  &lt;h3&gt;🏖️ 6. Dampak &amp; Pemanfaatan Pasang Surut bagi Pariwisata Bahari&lt;/h3&gt;
  &lt;div class=&quot;grid-2&quot;&gt;
    &lt;div class=&quot;card green&quot;&gt;
      &lt;div class=&quot;card-title&quot;&gt;✅ Dampak Positif&lt;/div&gt;
      &lt;ul class=&quot;nice&quot;&gt;
        &lt;li&gt;Terciptanya &lt;strong&gt;kolam pasang surut&lt;/strong&gt; (tidal pools) di pantai berbatu&lt;/li&gt;
        &lt;li&gt;Memberikan &lt;strong&gt;peluang untuk snorkeling&lt;/strong&gt; saat air surut dan terumbu karang terekspos&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Penampilan lanskap pantai yang lebih menarik&lt;/strong&gt; — variasi antara kondisi pasang dan surut menciptakan daya tarik visual&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card orange&quot;&gt;
      &lt;div class=&quot;card-title&quot;&gt;🌊 Pemanfaatan dalam Pariwisata&lt;/div&gt;
      &lt;ul class=&quot;nice&quot;&gt;
        &lt;li&gt;&lt;strong&gt;Wisata selancar (surfing) saat pasang&lt;/strong&gt; — ombak lebih besar dan kondusif untuk selancar&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Wisata jelajah pantai saat surut&lt;/strong&gt; — akses ke lokasi yang tertutup air saat pasang (contoh: Tanah Lot Bali)&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Aktivitas memancing&lt;/strong&gt; — ikan lebih aktif pada perubahan pasang surut&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;🏯 Contoh Kasus: Tanah Lot, Bali&lt;/div&gt;
    &lt;div class=&quot;two-col&quot;&gt;
      &lt;div style=&quot;background:#f0faf6;border-radius:8px;padding:14px;&quot;&gt;
        &lt;div style=&quot;font-weight:700;color:var(--green-tide);margin-bottom:8px;&quot;&gt;🔽 Saat Surut&lt;/div&gt;
        &lt;p style=&quot;font-size:0.9rem;&quot;&gt;Jalan menuju pura Tanah Lot &lt;strong&gt;dapat dilewati&lt;/strong&gt;. Wisatawan dapat berjalan kaki menuju pura yang berdiri di atas batu karang.&lt;/p&gt;
      &lt;/div&gt;
      &lt;div style=&quot;background:#fdf0f0;border-radius:8px;padding:14px;&quot;&gt;
        &lt;div style=&quot;font-weight:700;color:var(--coral);margin-bottom:8px;&quot;&gt;🔼 Saat Pasang&lt;/div&gt;
        &lt;p style=&quot;font-size:0.9rem;&quot;&gt;Jalan menuju pura &lt;strong&gt;tertutup air laut&lt;/strong&gt;. Pura tampak berdiri sendiri di tengah lautan, menciptakan pemandangan ikonik.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/section&gt;

&lt;!-- ===== SECTION 3: CHEAT SHEET ===== --&gt;
&lt;section id=&quot;cheatsheet&quot;&gt;
  &lt;div class=&quot;section-header&quot;&gt;
    &lt;div class=&quot;section-icon icon-yellow&quot;&gt;⚡&lt;/div&gt;
    &lt;div&gt;
      &lt;h2&gt;Cheat Sheet Ujian&lt;/h2&gt;
      &lt;p style=&quot;color:#5d8aa8;font-size:0.93rem;margin-top:2px;&quot;&gt;Poin inti yang WAJIB diingat — belajar cepat menjelang ujian&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;cheat-grid&quot;&gt;
    &lt;div class=&quot;cheat-card&quot;&gt;
      &lt;h4&gt;🌊 Definisi &amp; Konsep&lt;/h4&gt;
      &lt;ul&gt;
        &lt;li&gt;Pasang surut = naik turun permukaan laut secara periodik&lt;/li&gt;
        &lt;li&gt;Disebabkan gravitasi + gaya tarik benda astronomi (Bumi, Bulan, Matahari)&lt;/li&gt;
        &lt;li&gt;Puncak elevasi = pasang tinggi (high tide)&lt;/li&gt;
        &lt;li&gt;Lembah elevasi = pasang rendah (low tide)&lt;/li&gt;
        &lt;li&gt;Tidal Range = waktu puncak ke puncak berikutnya&lt;/li&gt;
        &lt;li&gt;2× pasang tertinggi per bulan: saat konjungsi &amp; oposisi&lt;/li&gt;
        &lt;li&gt;Konjungsi = Bulan Baru | Oposisi = Bulan Purnama&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;

    &lt;div class=&quot;cheat-card g&quot;&gt;
      &lt;h4&gt;⚖️ Teori Kesetimbangan (Newton)&lt;/h4&gt;
      &lt;ul&gt;
        &lt;li&gt;Dicetuskan: Sir Isaac Newton (1642–1727)&lt;/li&gt;
        &lt;li&gt;Menjelaskan pasut secara KUALITATIF&lt;/li&gt;
        &lt;li&gt;Bumi ideal: bulat, seluruh permukaan tertutup air&lt;/li&gt;
        &lt;li&gt;Permukaan laut naik ∝ gaya pembangkit pasut&lt;/li&gt;
        &lt;li&gt;2 sistem: Bumi-Bulan &amp; Bumi-Matahari&lt;/li&gt;
        &lt;li&gt;Air tinggi di 2 lokasi, air rendah di 2 lokasi&lt;/li&gt;
        &lt;li&gt;Faktor: rotasi bumi, revolusi bulan, revolusi bumi&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;

    &lt;div class=&quot;cheat-card o&quot;&gt;
      &lt;h4&gt;🌀 Teori Dinamis&lt;/h4&gt;
      &lt;ul&gt;
        &lt;li&gt;Gaya pembangkit → menghasilkan gelombang pasut&lt;/li&gt;
        &lt;li&gt;Periode gelombang ∝ gaya pembangkit&lt;/li&gt;
        &lt;li&gt;Lautan homogen, kedalaman konstan di seluruh Bumi&lt;/li&gt;
        &lt;li&gt;Gaya tarik periodik → gelombang sesuai konstituennya&lt;/li&gt;
        &lt;li&gt;Faktor: kedalaman &amp; luas perairan&lt;/li&gt;
        &lt;li&gt;Faktor: gaya Coriolis (rotasi Bumi)&lt;/li&gt;
        &lt;li&gt;Faktor: gesekan dasar (bottom friction)&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;

    &lt;div class=&quot;cheat-card r&quot;&gt;
      &lt;h4&gt;🌕 Pasang Purnama vs Perbani&lt;/h4&gt;
      &lt;ul&gt;
        &lt;li&gt;SPRING: Bumi-Bulan-Matahari → satu garis lurus&lt;/li&gt;
        &lt;li&gt;SPRING: Bulan Baru + Bulan Purnama&lt;/li&gt;
        &lt;li&gt;SPRING: Pasang SANGAT TINGGI, surut SANGAT RENDAH&lt;/li&gt;
        &lt;li&gt;NEAP: Bumi-Bulan-Matahari → tegak lurus (90°)&lt;/li&gt;
        &lt;li&gt;NEAP: Bulan seperempat + tiga perempat&lt;/li&gt;
        &lt;li&gt;NEAP: Pasang rendah, surut tinggi (range kecil)&lt;/li&gt;
        &lt;li&gt;Per bulan: 2× Spring, 2× Neap&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;

    &lt;div class=&quot;cheat-card p&quot;&gt;
      &lt;h4&gt;📊 3 Tipe Pasang Surut Harian&lt;/h4&gt;
      &lt;ul&gt;
        &lt;li&gt;DIURNAL: 1 pasang + 1 surut / hari&lt;/li&gt;
        &lt;li&gt;Diurnal: Selat Karimata&lt;/li&gt;
        &lt;li&gt;SEMI-DIURNAL: 2 pasang + 2 surut / hari (sama)&lt;/li&gt;
        &lt;li&gt;Semi-diurnal: Selat Malaka, Laut Andaman&lt;/li&gt;
        &lt;li&gt;MIXED DIURNAL: 2 pasang + 2 surut / hari (berbeda)&lt;/li&gt;
        &lt;li&gt;Mixed diurnal: banyak wilayah Indonesia&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;

    &lt;div class=&quot;cheat-card g&quot;&gt;
      &lt;h4&gt;🏖️ Dampak &amp; Pemanfaatan Wisata&lt;/h4&gt;
      &lt;ul&gt;
        &lt;li&gt;Dampak +: kolam pasang surut terbentuk&lt;/li&gt;
        &lt;li&gt;Dampak +: peluang snorkeling&lt;/li&gt;
        &lt;li&gt;Dampak +: lanskap pantai lebih menarik&lt;/li&gt;
        &lt;li&gt;Manfaat: wisata selancar saat pasang&lt;/li&gt;
        &lt;li&gt;Manfaat: wisata jelajah saat surut&lt;/li&gt;
        &lt;li&gt;Manfaat: aktivitas memancing&lt;/li&gt;
        &lt;li&gt;Contoh: Tanah Lot Bali&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;highlight-green&quot; style=&quot;margin-top:20px;&quot;&gt;
    &lt;strong&gt;🎯 Yang PALING SERING muncul di ujian:&lt;/strong&gt; Definisi pasang surut, perbedaan Teori Kesetimbangan vs Dinamis, perbedaan Spring Tide vs Neap Tide, 3 tipe pasang surut harian beserta lokasi contohnya di Indonesia, faktor penyebab pasang surut (dari kedua teori).
  &lt;/div&gt;
&lt;/section&gt;

  &lt;div class=&quot;section-header&quot;&gt;
    &lt;div class=&quot;section-icon icon-red&quot;&gt;🧪&lt;/div&gt;
    &lt;div&gt;
      &lt;h2&gt;Prediksi Soal Ujian &amp; Pembahasan&lt;/h2&gt;
      &lt;p style=&quot;color:#5d8aa8;font-size:0.93rem;margin-top:2px;&quot;&gt;25 soal dengan jawaban &amp; pembahasan lengkap&lt;/p&gt;
